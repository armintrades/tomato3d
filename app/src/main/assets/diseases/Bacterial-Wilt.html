<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>پژمردگی باکتریایی گوجه فرنگی (Bacterial Wilt) | Ralstonia solanacearum</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1b3d2a, #0d2a1a);
            font-family: 'Segoe UI', 'Vazirmatn', Tahoma, system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .master {
            max-width: 750px;
            width: 100%;
            background: #27261cd9;
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 12px;
            box-shadow: 0 12px 28px black;
        }
        .card {
            background: #fef8ec;
            border-radius: 1.8rem;
            padding: 1rem;
            box-shadow: inset 0 0 0 1px #fff9e8, 0 6px 14px rgba(0,0,0,0.2);
        }
        .title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: #9b4b2c;
            text-shadow: 1px 1px 0 #e2d5c0;
        }
        .sub {
            text-align: center;
            font-size: 0.75rem;
            color: #b47c44;
            border-bottom: 2px dashed #dabd88;
            display: inline-block;
            width: auto;
            margin: 0 auto 12px auto;
            padding-bottom: 4px;
        }
        .svg-container {
            background: #e7ddc4;
            border-radius: 1.2rem;
            padding: 8px;
            text-align: center;
            margin: 8px 0;
            box-shadow: inset 0 0 0 2px #fef5e2, 0 4px 10px rgba(0,0,0,0.15);
            min-height: 580px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        svg {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 1rem;
        }
        .button-area {
            display: flex;
            justify-content: center;
            margin: 12px 0;
        }
        button {
            background: #c08545;
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 2rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        button:active { transform: scale(0.96); }
        .info-panel {
            background: #efe4cf;
            border-radius: 1.2rem;
            padding: 0.9rem;
            margin-top: 12px;
            border-right: 5px solid #aa7942;
            text-align: right;
            font-size: 0.75rem;
            max-height: 55vh;
            overflow-y: auto;
        }
        .stage-name {
            font-size: 1rem;
            font-weight: bold;
            color: #4a3920;
            background: #fdf1df;
            padding: 4px 10px;
            border-radius: 2rem;
            display: inline-block;
            margin-bottom: 8px;
        }
        .section {
            margin-top: 10px;
            background: #faf3e3;
            padding: 8px;
            border-radius: 1rem;
        }
        .section-title {
            font-weight: bold;
            color: #6b3f1c;
            border-right: 3px solid #c6904b;
            padding-right: 8px;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }
        .section-content { line-height: 1.45; color: #2c2a1a; }
        hr { margin: 8px 0; border-color: #dbbc87; }
        .highlight { background: #f5e6c4; padding: 2px 6px; border-radius: 12px; font-weight: bold; }
        footer {
            text-align: center;
            font-size: 0.6rem;
            color: #aa956b;
            margin-top: 10px;
        }
        @media (max-width: 500px) {
            .master { padding: 8px; }
            .card { padding: 0.7rem; }
            .title { font-size: 1.2rem; }
            .info-panel { font-size: 0.7rem; max-height: 50vh; }
        }
    </style>
</head>
<body>
<div class="master">
    <div class="card">
        <div class="title">🍅 پژمردگی باکتریایی (Bacterial Wilt)</div>
        <div style="text-align: center;"><div class="sub">عامل: باکتری Ralstonia solanacearum | بیماری خاک‌زاد بسیار خطرناک در هرمزگان ⚠️</div></div>

        <div class="svg-container">
            <svg id="tomatoLeafSvg" viewBox="0 0 600 750" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
                        <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#2d2a1a" flood-opacity="0.25"/>
                    </filter>
                    <filter id="veinGlow"><feGaussianBlur stdDeviation="1"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    <linearGradient id="leafGrad" x1="20%" y1="0%" x2="80%" y2="100%">
                        <stop offset="0%" stop-color="#6daa44"/><stop offset="60%" stop-color="#468a2e"/><stop offset="100%" stop-color="#2d6b1e"/>
                    </linearGradient>
                    <linearGradient id="fruitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#e84030"/><stop offset="50%" stop-color="#cc3020"/><stop offset="100%" stop-color="#aa2518"/>
                    </linearGradient>
                    <linearGradient id="petioleGrad" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#8b744b"/><stop offset="100%" stop-color="#b4925e"/>
                    </linearGradient>
                    <radialGradient id="fruitShine" cx="35%" cy="30%" r="50%">
                        <stop offset="0%" stop-color="#ffaaa0" stop-opacity="0.5"/>
                        <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
                    </radialGradient>
                </defs>
                <g filter="url(#shadow)">
                    <!-- ==================== برگ پژمرده ==================== -->
                    <path id="petiolePath" d="M300,480 C285,515 270,555 285,610 Q295,640 310,655" stroke="url(#petioleGrad)" stroke-width="14" fill="none" stroke-linecap="round"/>
                    <path id="petioleInner" d="M300,480 C310,510 325,555 312,610" stroke="#b7975f" stroke-width="3" fill="none" opacity="0.5"/>

                    <g id="leafGroup">
                        <path id="leafBlade" d="M300,160 C340,175 375,200 405,240 C425,268 442,298 448,330 C452,358 450,385 440,410 C425,445 400,475 372,500 C355,514 335,525 312,525 C290,525 270,514 253,500 C225,475 200,445 185,410 C175,385 173,358 177,330 C183,298 200,268 220,240 C250,200 285,175 300,160Z" fill="url(#leafGrad)" stroke="#3e6827" stroke-width="1.8"/>

                        <!-- پژمردگی شدید (برگ آویزان) -->
                        <g id="wilting" opacity="0">
                            <path d="M340,175 Q370,250 350,320" stroke="#7a8a5a" stroke-width="2.5" fill="none" opacity="0.6"/>
                            <path d="M375,200 Q410,280 385,350" stroke="#7a8a5a" stroke-width="2.5" fill="none" opacity="0.6"/>
                            <path d="M280,175 Q250,250 270,320" stroke="#7a8a5a" stroke-width="2.5" fill="none" opacity="0.6"/>
                            <path d="M245,200 Q210,280 235,350" stroke="#7a8a5a" stroke-width="2.5" fill="none" opacity="0.6"/>
                        </g>

                        <!-- زردی خفیف برگ (بدون لکه) -->
                        <g id="mildChlorosis" opacity="0">
                            <ellipse cx="340" cy="280" rx="45" ry="35" fill="#e0c33e" opacity="0.4"/>
                            <ellipse cx="290" cy="360" rx="50" ry="40" fill="#ddd055" opacity="0.35"/>
                            <ellipse cx="370" cy="420" rx="35" ry="25" fill="#e0c33e" opacity="0.35"/>
                        </g>

                        <!-- نکروز خفیف در مراحل پیشرفته -->
                        <g id="necrosis" opacity="0">
                            <path d="M405,240 C430,280 448,330 445,380" stroke="#7a4e2a" stroke-width="8" fill="none" opacity="0.5" stroke-linecap="round"/>
                            <path d="M220,240 C195,280 177,330 180,380" stroke="#7a4e2a" stroke-width="8" fill="none" opacity="0.5" stroke-linecap="round"/>
                        </g>

                        <!-- رگبرگ اصلی -->
                        <path id="midVein" d="M300,170 Q293,280 300,490" stroke="#5b953c" stroke-width="4.5" fill="none" stroke-linecap="round" filter="url(#veinGlow)"/>
                        <path id="midVeinInner" d="M300,170 Q295,280 300,490" stroke="#a3df78" stroke-width="1.4" fill="none"/>

                        <!-- رگبرگ فرعی -->
                        <g id="veinsGroup" stroke="#4b8231" fill="none" stroke-linecap="round">
                            <path d="M300,210 Q330,225 355,240" stroke-width="2.6"/><path d="M300,210 Q270,225 245,240" stroke-width="2.6"/>
                            <path d="M300,260 Q345,275 385,295" stroke-width="2.8"/><path d="M300,260 Q255,275 215,295" stroke-width="2.8"/>
                            <path d="M300,320 Q355,340 410,365" stroke-width="3"/><path d="M300,320 Q245,340 190,365" stroke-width="3"/>
                            <path d="M300,380 Q350,395 395,425" stroke-width="2.6"/><path d="M300,380 Q250,395 205,425" stroke-width="2.6"/>
                            <path d="M300,440 Q335,455 365,485" stroke-width="2.4"/><path d="M300,440 Q265,455 235,485" stroke-width="2.4"/>
                        </g>

                        <!-- تریکوم -->
                        <g id="trichomesGroup" stroke="#b6a467" fill="none" stroke-width="0.8" opacity="0.9">
                            <path d="M380,230 L390,225"/><circle cx="390" cy="225" r="1.1" fill="#cfb572"/>
                            <path d="M410,280 L422,272"/><circle cx="422" cy="272" r="1.2" fill="#cfb572"/>
                            <path d="M435,340 L448,332"/><circle cx="448" cy="332" r="1.2" fill="#cfb572"/>
                            <path d="M420,400 L433,395"/><circle cx="433" cy="395" r="1.1" fill="#cfb572"/>
                            <path d="M380,460 L390,455"/><circle cx="390" cy="455" r="1.1" fill="#cfb572"/>
                            <path d="M220,230 L210,225"/><circle cx="210" cy="225" r="1.1" fill="#cfb572"/>
                            <path d="M190,280 L178,272"/><circle cx="178" cy="272" r="1.2" fill="#cfb572"/>
                            <path d="M165,340 L152,332"/><circle cx="152" cy="332" r="1.2" fill="#cfb572"/>
                            <path d="M180,400 L168,395"/><circle cx="168" cy="395" r="1.1" fill="#cfb572"/>
                            <path d="M220,460 L210,455"/><circle cx="210" cy="455" r="1.1" fill="#cfb572"/>
                        </g>

                        <!-- روزنه‌ها -->
                        <g id="stomataGroup" fill="#6a8c50" opacity="0.4">
                            <ellipse cx="340" cy="260" rx="1.3" ry="2" transform="rotate(15 340 260)"/>
                            <ellipse cx="320" cy="290" rx="1.2" ry="1.9" transform="rotate(-20 320 290)"/>
                            <ellipse cx="370" cy="310" rx="1.4" ry="2.1" transform="rotate(30 370 310)"/>
                            <ellipse cx="290" cy="330" rx="1.3" ry="2" transform="rotate(-10 290 330)"/>
                            <ellipse cx="410" cy="350" rx="1.2" ry="1.9" transform="rotate(10 410 350)"/>
                            <ellipse cx="220" cy="280" rx="1.4" ry="2.1" transform="rotate(-25 220 280)"/>
                            <ellipse cx="260" cy="400" rx="1.3" ry="2" transform="rotate(5 260 400)"/>
                            <ellipse cx="350" cy="430" rx="1.2" ry="1.9" transform="rotate(20 350 430)"/>
                        </g>
                    </g>

                    <!-- ==================== ساقه و ریشه ==================== -->
                    <g id="stemGroup">
                        <!-- ساقه اصلی -->
                        <path d="M300,510 C295,535 290,560 288,600" stroke="#5a7a3a" stroke-width="12" fill="none"/>
                        <path d="M288,600 C286,620 285,640 283,660" stroke="#5a7a3a" stroke-width="10" fill="none"/>
                        
                        <!-- ترشح موکوس (علامت اختصاصی پژمردگی باکتریایی) -->
                        <g id="bacterialOoze" opacity="0">
                            <ellipse cx="295" cy="550" rx="8" ry="12" fill="#c8b890" opacity="0.6"/>
                            <ellipse cx="295" cy="550" rx="5" ry="8" fill="#e8dcc0" opacity="0.5"/>
                            <path d="M288,545 L302,555" stroke="#d8c8a0" stroke-width="1.5" opacity="0.7"/>
                            <path d="M290,558 L300,548" stroke="#d8c8a0" stroke-width="1.5" opacity="0.7"/>
                        </g>
                        
                        <!-- آوند قهوه‌ای در ساقه (برش فرضی) -->
                        <g id="brownVascular" opacity="0">
                            <ellipse cx="293" cy="580" rx="10" ry="6" fill="#8a6a4a" opacity="0.8"/>
                            <ellipse cx="305" cy="580" rx="8" ry="5" fill="#8a6a4a" opacity="0.7"/>
                        </g>
                    </g>

                    <!-- ==================== میوه ==================== -->
                    <g id="fruitGroup">
                        <path d="M490,620 Q500,595 510,575" stroke="#5a7a3a" stroke-width="3.5" fill="none"/>
                        <path d="M510,575 Q515,562 525,555" stroke="#5a7a3a" stroke-width="2.5" fill="none"/>
                        
                        <path d="M525,555 Q512,542 500,548" stroke="#3a6a2a" stroke-width="2.5" fill="none"/>
                        <path d="M525,555 Q530,540 545,545" stroke="#3a6a2a" stroke-width="2.5" fill="none"/>
                        <path d="M525,555 Q520,535 510,538" stroke="#3a6a2a" stroke-width="2.5" fill="none"/>
                        <path d="M525,555 Q540,550 548,560" stroke="#3a6a2a" stroke-width="2" fill="none"/>
                        <path d="M525,555 Q505,550 498,560" stroke="#3a6a2a" stroke-width="2" fill="none"/>
                        
                        <ellipse cx="525" cy="620" rx="48" ry="58" fill="url(#fruitGrad)"/>
                        <ellipse cx="525" cy="620" rx="48" ry="58" fill="url(#fruitShine)"/>
                        
                        <!-- میوه کوچک -->
                        <g id="smallFruit" opacity="0">
                            <ellipse cx="525" cy="620" rx="32" ry="40" fill="#cc3020" opacity="0.6"/>
                            <ellipse cx="525" cy="620" rx="32" ry="40" fill="none" stroke="#8a4e2a" stroke-width="1.5" opacity="0.5"/>
                        </g>
                    </g>
                </g>
            </svg>
        </div>

        <div class="button-area">
            <button id="stageBtn">🦠 مراحل پیشرفت پژمردگی باکتریایی (سالم ← خفیف ← متوسط ← شدید)</button>
        </div>

        <div class="info-panel" id="infoPanel"></div>
        <footer>🔍 پژمردگی ناگهانی + ترشح موکوس سفید از ساقه = پژمردگی باکتریایی</footer>
    </div>
</div>

<script>
    (function() {
        const leafGrad = document.getElementById('leafGrad');
        const wilting = document.getElementById('wilting');
        const mildChlorosis = document.getElementById('mildChlorosis');
        const necrosis = document.getElementById('necrosis');
        const bacterialOoze = document.getElementById('bacterialOoze');
        const brownVascular = document.getElementById('brownVascular');
        const smallFruit = document.getElementById('smallFruit');
        const midVein = document.getElementById('midVein');
        const veinsGroup = document.getElementById('veinsGroup');
        const trichomesGroup = document.getElementById('trichomesGroup');
        const petiolePath = document.getElementById('petiolePath');
        
        let currentStage = 0;
        
        function setSeverityVisual(severity) {
            const hue = 85 - severity * 15;
            const sat = 55 - severity * 12;
            const light = 42 - severity * 10;
            const stops = leafGrad.querySelectorAll('stop');
            if (stops.length >= 3) {
                stops[0].setAttribute('stop-color', `hsl(${hue}, ${sat}%, ${light+5}%)`);
                stops[1].setAttribute('stop-color', `hsl(${hue-4}, ${sat-4}%, ${light-2}%)`);
                stops[2].setAttribute('stop-color', `hsl(${hue-8}, ${sat-8}%, ${light-6}%)`);
            }
            
            let wiltOp = severity * 0.9;
            wilting.setAttribute('opacity', Math.min(0.85, wiltOp).toString());
            
            let chloroOp = severity * 0.7;
            mildChlorosis.setAttribute('opacity', Math.min(0.6, chloroOp).toString());
            
            let necroOp = (severity > 0.55) ? (severity - 0.55) * 0.7 : 0;
            necrosis.setAttribute('opacity', Math.min(0.4, necroOp).toString());
            
            let oozeOp = (severity > 0.35) ? (severity - 0.35) * 1.2 : 0;
            bacterialOoze.setAttribute('opacity', Math.min(0.9, oozeOp).toString());
            
            let vascularOp = (severity > 0.45) ? (severity - 0.45) * 1.0 : 0;
            brownVascular.setAttribute('opacity', Math.min(0.8, vascularOp).toString());
            
            let fruitOp = (severity > 0.5) ? (severity - 0.5) * 0.8 : 0;
            smallFruit.setAttribute('opacity', Math.min(0.6, fruitOp).toString());
            
            const veinColor = (severity > 0.6) ? "#8a9a5a" : "#5b953c";
            midVein.setAttribute('stroke', veinColor);
            const allVeins = veinsGroup.querySelectorAll('path');
            allVeins.forEach(p => p.setAttribute('stroke', (severity > 0.6) ? "#8a9a5a" : "#4b8231"));
            trichomesGroup.setAttribute('stroke', severity > 0.5 ? "#a88f58" : "#b6a467");
            
            if (severity > 0.6) {
                petiolePath.setAttribute('stroke', "#9a8050");
            } else {
                petiolePath.setAttribute('stroke', "url(#petioleGrad)");
            }
        }
        
        const stageDetails = [
            {
                name: "🌿 مرحله ۰: گیاه کاملاً سالم",
                symptoms: "🔹 برگ: سبز یکدست، شاداب<br>🔹 ساقه: سبز، بدون ترشح<br>🍅 میوه: قرمز یکدست",
                science: "📗 شرایط مساعد برای پژمردگی باکتریایی:<br>• دمای خاک ۲۵-۳۵ درجه (گرم)<br>• رطوبت بالای خاک<br>• خاک با زهکشی ضعیف<br>• pH اسیدی (۵.۵-۶.۵)<br>• سابقه کشت گوجه در زمین",
                control: "🛡️ پیشگیری (تنها راه موفق):<br>• استفاده از ارقام مقاوم (مهم‌ترین راه)<br>• تناوب زراعی ۴-۵ ساله با غلات<br>• ضدعفونی خاک (آفتاب‌دهی<br>• زهکشی مناسب<br>• استفاده از نشا سالم"
            },
            {
                name: "⚠️ مرحله ۱: آلودگی خفیف",
                symptoms: "🟡 برگ: پژمردگی خفیف در گرمای روز (احیای شب)، زردی خفیف برگ‌های بالایی<br>🌿 ساقه: بدون ترشح قابل مشاهده<br>🍅 میوه: طبیعی",
                science: "🔬 باکتری از طریق زخم‌های ریشه وارد آوندهای چوبی می‌شود. در رطوبت بالا، باکتری در آوندها تکثیر می‌شود.",
                control: "💊 کنترل اولیه:<br>• حذف بوته‌های آلوده<br>• قارچکش‌ها و باکتری‌کش‌ها مؤثر نیستند<br>• افزایش زهکشی خاک"
            },
            {
                name: "🥀 مرحله ۲: آلودگی متوسط",
                symptoms: "🟡 برگ: پژمردگی دائمی، زردی واضح، رشد متوقف<br>🌿 ساقه: ترشح موکوس سفید از ساقه (علامت اختصاصی)، آوند قهوه‌ای<br>🍅 میوه: کوچک، کیفیت پایین",
                science: "🧪 باکتری آوندها را مسدود کرده و جریان آب را قطع می‌کند. ترشح موکوس نشانه آلودگی شدید است.",
                control: "💊 مدیریت (بدون درمان قطعی):<br>• حذف بوته‌های آلوده<br>• آبیاری محدود (کاهش رطوبت)<br>• عدم کشت مجدد در آن زمین"
            },
            {
                name: "🔴 مرحله ۳: آلودگی شدید (بحرانی)",
                symptoms: "🔴 برگ: پژمردگی کامل و دائمی، زردی شدید، خشکی و مرگ بوته<br>🌿 ساقه: ترشح موکوس فراوان، آوند قهوه‌ای تیره<br>🍅 میوه: تشکیل نمی‌شود یا بسیار ریز",
                science: "⚠️ کاهش محصول ۸۰-۱۰۰٪. باکتری در خاک تا ۵ سال زنده می‌ماند. کاشت مجدد گوجه در آن زمین سال‌ها غیرممکن است.",
                control: "🌱 مدیریت اضطراری:<br>• حذف کامل بوته‌های آلوده (خارج از مزرعه)<br>• تناوب طولانی (۴-۵ سال) با غلات غیرمیزبان<br>• ضدعفونی خاک با آفتاب‌دهی و بخار"
            }
        ];
        
        function goToStage(stage) {
            currentStage = stage;
            let intensity = 0;
            if (stage === 0) intensity = 0;
            if (stage === 1) intensity = 0.35;
            if (stage === 2) intensity = 0.65;
            if (stage === 3) intensity = 0.95;
            
            setSeverityVisual(intensity);
            
            const data = stageDetails[stage];
            const infoDiv = document.getElementById('infoPanel');
            infoDiv.innerHTML = `
                <div class="stage-name">${data.name}</div>
                <div class="section">
                    <div class="section-title">🍃 علائم روی برگ، ساقه و میوه</div>
                    <div class="section-content">${data.symptoms}</div>
                </div>
                <div class="section">
                    <div class="section-title">🧫 شرایط مساعد و چرخه بیماری</div>
                    <div class="section-content">${data.science}</div>
                </div>
                <div class="section">
                    <div class="section-title">💊 روش‌های کنترل و درمان</div>
                    <div class="section-content">${data.control}</div>
                </div>
                <hr>
                <div class="section-content highlight">🎯 <strong>تشخیص قطعی:</strong> ساقه را ببرید و در آب قرار دهید. اگر جریان سفید (موکوس) خارج شد → پژمردگی باکتریایی</div>
                <div class="section-content" style="margin-top:8px; background:#fae6c3; padding:5px; border-radius:12px;">
                    ⚠️ <strong>نکته مهم:</strong> این بیماری با قارچکش و باکتری‌کش قابل درمان نیست. تنها راه پیشگیری، استفاده از ارقام مقاوم و تناوب زراعی است.
                </div>
            `;
        }
        
        const btn = document.getElementById('stageBtn');
        btn.addEventListener('click', () => {
            let next = currentStage + 1;
            if (next > 3) next = 0;
            goToStage(next);
        });
        
        goToStage(0);
    })();
</script>
</body>
</html>
