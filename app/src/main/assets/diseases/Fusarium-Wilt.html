<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>پژمردگی فوزاریومی گوجه فرنگی | Fusarium Wilt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1b3d2a, #0d2a1a);
            font-family: 'Segoe UI', 'Vazirmatn', Tahoma, system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 750px;
            width: 100%;
            background: #27261cd9;
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 12px;
            box-shadow: 0 12px 28px black;
        }
        .card {
            background: #fef8ec;
            border-radius: 1.8rem;
            padding: 1rem;
            text-align: center;
        }
        h1 {
            font-size: 1.4rem;
            color: #9b4b2c;
            margin-bottom: 4px;
        }
        .sub {
            font-size: 0.7rem;
            color: #b47c44;
            border-bottom: 2px dashed #dabd88;
            display: inline-block;
            margin-bottom: 12px;
            padding-bottom: 4px;
        }
        .svg-wrap {
            background: #e7ddc4;
            border-radius: 1.2rem;
            padding: 10px;
            margin: 8px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        svg {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 1rem;
        }
        button {
            background: #c08545;
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 2rem;
            font-size: 0.9rem;
            margin: 12px 0;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            transition: 0.1s;
        }
        button:active {
            transform: scale(0.96);
        }
        .info {
            background: #efe4cf;
            border-radius: 1.2rem;
            padding: 0.9rem;
            text-align: right;
            font-size: 0.75rem;
            max-height: 55vh;
            overflow-y: auto;
            border-right: 5px solid #aa7942;
        }
        .stage-title {
            font-weight: bold;
            font-size: 1rem;
            background: #fdf1df;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 2rem;
            margin-bottom: 8px;
        }
        .block {
            background: #faf3e3;
            padding: 8px;
            border-radius: 1rem;
            margin-top: 8px;
        }
        .block-title {
            font-weight: bold;
            color: #6b3f1c;
            border-right: 3px solid #c6904b;
            padding-right: 8px;
            margin-bottom: 5px;
        }
        .warning {
            background: #fae6c3;
            border-right: 4px solid #c67a2e;
            padding: 6px 10px;
            border-radius: 12px;
            margin-top: 8px;
        }
        footer {
            font-size: 0.6rem;
            color: #aa956b;
            margin-top: 10px;
        }
        @media (max-width: 500px) {
            .container { padding: 8px; }
            .card { padding: 0.7rem; }
            h1 { font-size: 1.2rem; }
            .info { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🍅 پژمردگی فوزاریومی (Fusarium Wilt)</h1>
        <div class="sub">عامل: قارچ Fusarium oxysporum | بیماری خاک‌زاد خطرناک</div>

        <div class="svg-wrap">
            <svg id="fusariumSvg" viewBox="0 0 650 750" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- گرادیان برای برگ سالم -->
                    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#6daa44"/>
                        <stop offset="100%" stop-color="#2d6b1e"/>
                    </linearGradient>
                    <!-- گرادیان برای برگ زرد (خفیف تا متوسط) -->
                    <linearGradient id="gradYellow" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#e0c33e"/>
                        <stop offset="100%" stop-color="#aa8a2a"/>
                    </linearGradient>
                    <!-- گرادیان برای برگ مرده -->
                    <linearGradient id="gradDead" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#8a5a2a"/>
                        <stop offset="100%" stop-color="#4a2a1a"/>
                    </linearGradient>
                    <!-- گرادیان میوه سالم -->
                    <linearGradient id="gradFruit" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#e84030"/>
                        <stop offset="100%" stop-color="#aa2518"/>
                    </linearGradient>
                    <radialGradient id="shine" cx="35%" cy="30%" r="50%">
                        <stop offset="0%" stop-color="#ffaaa0" stop-opacity="0.5"/>
                        <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
                    </radialGradient>
                </defs>

                <!-- ==================== برگ ==================== -->
                <!-- برگ سالم (پیش‌فرض) -->
                <g id="leafHealthy">
                    <path d="M320,180 C360,195 395,220 425,260 C445,288 462,318 468,350 C472,378 470,405 460,430 C445,465 420,495 392,520 C375,534 355,545 332,545 C310,545 290,534 273,520 C245,495 220,465 205,430 C195,405 193,378 197,350 C203,318 220,288 240,260 C270,220 305,195 320,180Z" fill="url(#gradGreen)" stroke="#3e6827" stroke-width="1.5"/>
                    <path d="M320,190 Q313,300 320,510" stroke="#5b953c" stroke-width="4" fill="none"/>
                </g>

                <!-- برگ زرد (مرحله خفیف تا متوسط) -->
                <g id="leafYellow">
                    <path d="M320,180 C360,195 395,220 425,260 C445,288 462,318 468,350 C472,378 470,405 460,430 C445,465 420,495 392,520 C375,534 355,545 332,545 C310,545 290,534 273,520 C245,495 220,465 205,430 C195,405 193,378 197,350 C203,318 220,288 240,260 C270,220 305,195 320,180Z" fill="url(#gradYellow)" stroke="#7a5a2a" stroke-width="1.5"/>
                    <path d="M320,190 Q313,300 320,510" stroke="#7a8a3a" stroke-width="4" fill="none"/>
                    <!-- خطوط پژمردگی -->
                    <path d="M360,195 Q400,270 370,340" stroke="#7a8a5a" stroke-width="2.5" fill="none" opacity="0.6"/>
                    <path d="M300,195 Q260,270 290,340" stroke="#7a8a5a" stroke-width="2.5" fill="none" opacity="0.6"/>
                </g>

                <!-- برگ مرده قهوه‌ای (مرحله شدید) -->
                <g id="leafDead">
                    <path d="M320,180 C360,195 395,220 425,260 C445,288 462,318 468,350 C472,378 470,405 460,430 C445,465 420,495 392,520 C375,534 355,545 332,545 C310,545 290,534 273,520 C245,495 220,465 205,430 C195,405 193,378 197,350 C203,318 220,288 240,260 C270,220 305,195 320,180Z" fill="url(#gradDead)" stroke="#2a1508" stroke-width="1.5"/>
                    <path d="M320,190 Q313,300 320,510" stroke="#2a1508" stroke-width="4" fill="none"/>
                    <!-- ترک‌های خشکی -->
                    <path d="M425,260 C450,300 468,350 460,400" stroke="#2a1508" stroke-width="6" fill="none" opacity="0.8"/>
                    <path d="M240,260 C215,300 197,350 205,400" stroke="#2a1508" stroke-width="6" fill="none" opacity="0.8"/>
                </g>

                <!-- ==================== ساقه و برش ==================== -->
                <!-- ساقه سالم (همیشه نمایش داده شود، فقط برش اضافه می‌شود) -->
                <g id="stemBase">
                    <path d="M320,505 Q315,535 310,575" stroke="#5a7a3a" stroke-width="12" fill="none"/>
                    <path d="M310,575 Q305,615 300,660" stroke="#5a7a3a" stroke-width="10" fill="none"/>
                </g>

                <!-- برش ساقه + آوند قهوه‌ای (در مراحل پیشرفته نمایش داده شود) -->
                <g id="stemCut" opacity="0">
                    <!-- قسمت برش خورده -->
                    <ellipse cx="305" cy="600" rx="28" ry="18" fill="#e8dcc8" stroke="#8a7a50" stroke-width="2"/>
                    <!-- آوندهای قهوه‌ای تیره -->
                    <ellipse cx="294" cy="598" rx="7" ry="12" fill="#3a1508" opacity="0.95"/>
                    <ellipse cx="307" cy="600" rx="7" ry="13" fill="#3a1508" opacity="0.9"/>
                    <ellipse cx="320" cy="599" rx="6" ry="10" fill="#3a1508" opacity="0.85"/>
                    <!-- خط برش -->
                    <path d="M278,600 L332,600" stroke="#3a1a0a" stroke-width="2" stroke-dasharray="5 3"/>
                    <!-- متن -->
                    <text x="348" y="595" fill="#5a3a1a" font-size="11" font-weight="bold">آوند قهوه‌ای</text>
                    <text x="348" y="608" fill="#7a5a3a" font-size="8">(برش ساقه)</text>
                </g>

                <!-- ==================== میوه ==================== -->
                <!-- میوه سالم -->
                <g id="fruitHealthy">
                    <path d="M530,640 Q540,615 550,595" stroke="#5a7a3a" stroke-width="3" fill="none"/>
                    <path d="M550,595 Q555,582 565,575" stroke="#5a7a3a" stroke-width="2.5" fill="none"/>
                    <path d="M565,575 Q552,562 540,568" stroke="#3a6a2a" stroke-width="2.5" fill="none"/>
                    <path d="M565,575 Q570,560 585,565" stroke="#3a6a2a" stroke-width="2.5" fill="none"/>
                    <ellipse cx="565" cy="640" rx="48" ry="58" fill="url(#gradFruit)"/>
                    <ellipse cx="565" cy="640" rx="48" ry="58" fill="url(#shine)"/>
                </g>

                <!-- میوه چروکیده و تیره (مراحل پیشرفته) -->
                <g id="fruitWilted" opacity="0">
                    <ellipse cx="565" cy="640" rx="32" ry="40" fill="#8a4524" opacity="0.9"/>
                    <path d="M530,620 Q550,614 565,618" stroke="#5a2a1a" stroke-width="2" fill="none" opacity="0.8"/>
                    <path d="M545,650 Q560,656 580,648" stroke="#5a2a1a" stroke-width="2" fill="none" opacity="0.8"/>
                    <path d="M535,635 Q550,631 570,635" stroke="#5a2a1a" stroke-width="1.5" fill="none" opacity="0.7"/>
                    <ellipse cx="565" cy="640" rx="32" ry="40" fill="none" stroke="#2a1005" stroke-width="2" opacity="0.6"/>
                </g>
            </svg>
        </div>

        <button id="nextStageBtn">🌱 مرحله بعد (سالم → خفیف → متوسط → شدید)</button>

        <div class="info" id="infoPanel">
            <!-- محتوا توسط JS پر می‌شود -->
        </div>
        <footer>🔍 هر بار کلیک، شدت بیماری افزایش می‌یابد. در مرحله شدید برگ کاملاً قهوه‌ای و مرده + آوند قهوه‌ای در ساقه</footer>
    </div>
</div>

<script>
    // گرفتن المان‌های SVG
    const leafHealthy = document.getElementById('leafHealthy');
    const leafYellow = document.getElementById('leafYellow');
    const leafDead = document.getElementById('leafDead');
    const stemCut = document.getElementById('stemCut');
    const fruitHealthy = document.getElementById('fruitHealthy');
    const fruitWilted = document.getElementById('fruitWilted');

    let currentStep = 0; // 0: سالم, 1: خفیف, 2: متوسط, 3: شدید

    // تابع تغییر ظاهر بر اساس مرحله
    function updateStage(step) {
        // ابتدا همه چیز را مخفی می‌کنیم
        leafHealthy.style.opacity = '0';
        leafYellow.style.opacity = '0';
        leafDead.style.opacity = '0';
        stemCut.style.opacity = '0';
        fruitHealthy.style.opacity = '0';
        fruitWilted.style.opacity = '0';

        if (step === 0) { // سالم
            leafHealthy.style.opacity = '1';
            fruitHealthy.style.opacity = '1';
        } 
        else if (step === 1) { // خفیف
            leafHealthy.style.opacity = '0.3';
            leafYellow.style.opacity = '0.7';
            fruitHealthy.style.opacity = '1';
            stemCut.style.opacity = '0.4';
        }
        else if (step === 2) { // متوسط
            leafYellow.style.opacity = '1';
            fruitHealthy.style.opacity = '0.4';
            fruitWilted.style.opacity = '0.6';
            stemCut.style.opacity = '0.8';
        }
        else if (step === 3) { // شدید
            leafDead.style.opacity = '1';
            fruitWilted.style.opacity = '1';
            stemCut.style.opacity = '1';
        }
    }

    // داده‌های توضیحی برای هر مرحله
    const stageData = [
        {
            name: "🌿 مرحله ۰: گیاه کاملاً سالم",
            symptoms: "🔹 برگ: سبز یکدست، شاداب<br>🔹 ساقه: سبز، آوندها سفید<br>🍅 میوه: قرمز درشت، براق",
            science: "شرایط مساعد برای فوزاریوم:<br>• دمای خاک ۲۵-۳۰ درجه<br>• pH اسیدی (۵-۶)<br>• خاک شنی با زهکشی ضعیف<br>• تناوب کوتاه گوجه",
            control: "پیشگیری:<br>• ارقام مقاوم (حرف F)<br>• تناوب ۴-۵ ساله با غلات یا پیاز<br>• ضدعفونی خاک (آفتاب‌دهی)"
        },
        {
            name: "⚠️ مرحله ۱: آلودگی خفیف",
            symptoms: "🟡 برگ: زردی یک طرفه خفیف، پژمردگی در گرمای روز (احیای شب)<br>🌿 ساقه: آوندها کمی قهوه‌ای<br>🍅 میوه: طبیعی",
            science: "قارچ از طریق ریشه وارد آوندهای چوبی می‌شود. بیوماس قارچ آوندها را مسدود کرده و جریان آب را کاهش می‌دهد.",
            control: "کنترل اولیه:<br>• تیوفانات متیل (توپسین) ۲ گرم/لیتر خاک‌کاربرد<br>• افزایش آبیاری (رقیق شدن سم)<br>• حذف بوته‌های آلوده"
        },
        {
            name: "🥀 مرحله ۲: آلودگی متوسط",
            symptoms: "🟡 برگ: زردی و پژمردگی یک طرفه واضح، برگ‌های پایینی خشک، رشد متوقف<br>🌿 ساقه: آوند قهوه‌ای تیره در برش<br>🍅 میوه: کوچک، کیفیت پایین",
            science: "آوندها به شدت مسدود شده، گیاه توانایی تأمین آب برگ‌های بالایی را ندارد. فتوسنتز کاهش می‌یابد.",
            control: "کنترل شیمیایی (تأثیر محدود):<br>• تیوفانات متیل + مانکوزب<br>• پروپیکونازول ۰.۵ لیتر خاک‌کاربرد"
        },
        {
            name: "🔴 مرحله ۳: آلودگی شدید (بحرانی)",
            symptoms: "🔴 برگ: کاملاً قهوه‌ای، خشک و آویزان، ریزش برگ<br>🌿 ساقه: آوند قهوه‌ای تیره تا سیاه، کوتولگی شدید<br>🍅 میوه: چروکیده، تیره، غیرقابل مصرف",
            science: "کاهش محصول ۸۰-۱۰۰٪. قارچ در خاک تا ۱۰ سال زنده می‌ماند. کاشت مجدد گوجه در آن زمین سال‌ها غیرممکن است.",
            control: "مدیریت اضطراری:<br>• تخریب بوته‌های آلوده (خارج از مزرعه)<br>• تناوب طولانی (۴-۵ سال) با غلات<br>• ضدعفونی خاک در تابستان آینده"
        }
    ];

    // به‌روزرسانی پنل اطلاعات
    function updateInfoPanel(step) {
        const data = stageData[step];
        const panel = document.getElementById('infoPanel');
        panel.innerHTML = `
            <div class="stage-title">${data.name}</div>
            <div class="block">
                <div class="block-title">🍃 علائم</div>
                <div>${data.symptoms}</div>
            </div>
            <div class="block">
                <div class="block-title">🧫 شرایط مساعد و چرخه بیماری</div>
                <div>${data.science}</div>
            </div>
            <div class="block">
                <div class="block-title">💊 روش‌های کنترل و درمان</div>
                <div>${data.control}</div>
            </div>
            <div class="warning">
                🔍 <strong>تشخیص قطعی:</strong> ساقه را به صورت طولی ببرید. اگر آوندها قهوه‌ای یا سیاه بودند → پژمردگی فوزاریومی
            </div>
        `;
    }

    // دکمه مرحله بعد
    const btn = document.getElementById('nextStageBtn');
    btn.addEventListener('click', () => {
        currentStep = (currentStep + 1) % 4;
        updateStage(currentStep);
        updateInfoPanel(currentStep);
    });

    // مقداردهی اولیه (سالم)
    updateStage(0);
    updateInfoPanel(0);
</script>
</body>
</html>
