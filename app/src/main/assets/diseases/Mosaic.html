            {
                name: "🔴 مرحله ۳: آلودگی شدید (بحرانی)",
                symptoms: "🔴 برگ: موزاییک شدید، برگ‌های ریز و بدشکل، نکروز حاشیه، ریزش برگ<br>🍅 میوه: لکه‌های زرد و قهوه‌ای، میوه بسیار کوچک، بدشکل و کم رنگ، غیرقابل فروش",
                science: "⚠️ کاهش محصول ۵۰-۸۰٪. میوه‌ها بی‌کیفیت و فاقد ارزش اقتصادی. ویروس در گیاهان علف‌های هرز اطراف مزرعه زمستان‌گذرانی می‌کند.",
                control: "🌱 مدیریت اضطراری:<br>• حذف کامل بوته‌های آلوده (خارج از مزرعه)<br>• تناوب زراعی ۱-۲ ساله با غلات<br>• ضدعفونی خاک<br>• جمع‌آوری علف‌های هرز"
            }
        ];
        
        function goToStage(stage) {
            currentStage = stage;
            let intensity = 0;
            if (stage === 0) intensity = 0;
            if (stage === 1) intensity = 0.35;
            if (stage === 2) intensity = 0.65;
            if (stage === 3) intensity = 0.95;
            
            setSeverityVisual(intensity);
            
            const data = stageDetails[stage];
            const infoDiv = document.getElementById('infoPanel');
            infoDiv.innerHTML = `
                <div class="stage-name">${data.name}</div>
                <div class="section">
                    <div class="section-title">🍃 علائم روی برگ و میوه</div>
                    <div class="section-content">${data.symptoms}</div>
                </div>
                <div class="section">
                    <div class="section-title">🧫 شرایط مساعد و چرخه بیماری</div>
                    <div class="section-content">${data.science}</div>
                </div>
                <div class="section">
                    <div class="section-title">💊 روش‌های کنترل و درمان</div>
                    <div class="section-content">${data.control}</div>
                </div>
                <hr>
                <div class="section-content highlight">🎯 لکه‌های سبز روشن و تیره در هم (موزاییک) + بدشکلی برگ = ویروس TMV</div>
                <div class="section-content" style="margin-top:8px; background:#fae6c3; padding:5px; border-radius:12px;">
                    ⚠️ <strong>نکته مهم:</strong> ویروس TMV قابل درمان شیمیایی نیست. تنها راه پیشگیری، رعایت بهداشت و استفاده از نشا سالم است.
                </div>
            `;
        }
        
        const btn = document.getElementById('stageBtn');
        btn.addEventListener('click', () => {
            let next = currentStage + 1;
            if (next > 3) next = 0;
            goToStage(next);
        });
        
        goToStage(0);
    })();
</script>
</body>
</html>
