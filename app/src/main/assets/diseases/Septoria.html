<script>
    (function() {
        const leafGrad = document.getElementById('leafGrad');
        const septoriaSpots = document.getElementById('septoriaSpots');
        const yellowHalo = document.getElementById('yellowHalo');
        const marginNecrosis = document.getElementById('marginNecrosis');
        const fruitSpots = document.getElementById('fruitSpots');
        const smallFruit = document.getElementById('smallFruit');
        const midVein = document.getElementById('midVein');
        const veinsGroup = document.getElementById('veinsGroup');
        const trichomesGroup = document.getElementById('trichomesGroup');
        
        let currentStage = 0;
        
        function setSeverityVisual(severity) {
            const hue = 85 - severity * 15;
            const sat = 55 - severity * 12;
            const light = 42 - severity * 8;
            const stops = leafGrad.querySelectorAll('stop');
            if (stops.length >= 3) {
                stops[0].setAttribute('stop-color', `hsl(${hue}, ${sat}%, ${light+5}%)`);
                stops[1].setAttribute('stop-color', `hsl(${hue-4}, ${sat-4}%, ${light-2}%)`);
                stops[2].setAttribute('stop-color', `hsl(${hue-8}, ${sat-8}%, ${light-6}%)`);
            }
            
            let spotOp = severity * 0.9;
            septoriaSpots.setAttribute('opacity', Math.min(0.9, spotOp).toString());
            
            let haloOp = severity * 0.7;
            yellowHalo.setAttribute('opacity', Math.min(0.5, haloOp).toString());
            
            let necroOp = (severity > 0.5) ? (severity - 0.5) * 0.8 : 0;
            marginNecrosis.setAttribute('opacity', Math.min(0.5, necroOp).toString());
            
            let fruitSpotOp = (severity > 0.6) ? (severity - 0.6) * 0.8 : 0;
            fruitSpots.setAttribute('opacity', Math.min(0.4, fruitSpotOp).toString());
            
            let fruitSmallOp = (severity > 0.65) ? (severity - 0.65) * 1.2 : 0;
            smallFruit.setAttribute('opacity', Math.min(0.6, fruitSmallOp).toString());
            
            const veinColor = (severity > 0.6) ? "#8a9a5a" : "#5b953c";
            midVein.setAttribute('stroke', veinColor);
            const allVeins = veinsGroup.querySelectorAll('path');
            allVeins.forEach(p => p.setAttribute('stroke', (severity > 0.6) ? "#8a9a5a" : "#4b8231"));
            trichomesGroup.setAttribute('stroke', severity > 0.5 ? "#a88f58" : "#b6a467");
        }
        
        const stageDetails = [
            {
                name: "🌿 مرحله ۰: گیاه کاملاً سالم",
                symptoms: "🔹 برگ: سبز یکدست، بدون لکه<br>🍅 میوه: قرمز یکدست، براق",
                science: "📗 شرایط مساعد برای سپتوریا:<br>• دمای ۲۰-۲۵ درجه (خنک‌تر از بلایت زودرس)<br>• رطوبت نسبی >75%<br>• بارندگی یا آبیاری بارانی<br>• تهویه ضعیف<br>• بقایای گیاهی آلوده در خاک",
                control: "🛡️ پیشگیری:<br>• آبیاری قطره‌ای (نه بارانی)<br>• فاصله کاشت مناسب (تهویه)<br>• حذف برگ‌های پایینی آلوده<br>• تناوب زراعی ۲-۳ ساله<br>• استفاده از بذر سالم"
            },
            {
                name: "⚠️ مرحله ۱: آلودگی خفیف",
                symptoms: "🟤 برگ: لکه‌های کوچک گرد (۱-۲ میلی‌متر) روی برگ‌های پایینی، مرکز سفید، حاشیه قهوه‌ای، هاله زرد خفیف<br>🍅 میوه: بدون علائم",
                science: "🔬 قارچ از طریق روزنه‌های برگ وارد می‌شود. اسپورها در رطوبت بالا در ۴۸ ساعت جوانه می‌زنند.",
                control: "💊 کنترل اولیه:<br>• مانکوزب ۲ کیلو در ۱۰۰۰ لیتر آب<br>• حذف برگ‌های آلوده پایینی<br>• افزایش تهویه"
            },
            {
                name: "🟤 مرحله ۲: آلودگی متوسط",
                symptoms: "🟤 برگ: لکه‌های متعدد (۳-۵ میلی‌متر) با مرکز سفید و حاشیه قهوه‌ای، هاله زرد واضح، زردی و خشکی برگ‌های پایینی<br>🍅 میوه: کیسه کاهش می‌یابد",
                science: "🧪 قارچ درون بافت برگ گسترش می‌یابد. لکه‌ها به هم متصل می‌شوند و برگ از بین می‌رود. فتوسنتز کاهش می‌یابد.",
                control: "💊 کنترل شیمیایی:<br>• کلروتالونیل ۱.۵ لیتر<br>• آزوکسی استروبین ۰.۷۵ لیتر<br>• مانکوزب ۲ کیلو<br>(هر ۷-۱۰ روز)"
            },
            {
                name: "🔴 مرحله ۳: آلودگی شدید",
                symptoms: "🔴 برگ: لکه‌های متعدد، نکروز گسترده، زردی و ریزش شدید برگ‌های پایینی تا میانی، گیاه ضعیف<br>🍅 میوه: کوچک، آفتاب سوخته (به دلیل ریزش برگ‌های محافظ)، کیفیت پایین",
                science: "⚠️ کاهش محصول ۳۰-۵۰٪. قارچ روی بقایای گیاهی زمستان‌گذرانی می‌کند. در شرایط مساعد، بیماری به سرعت گسترش می‌یابد.",
                control: "🌱 مدیریت اضطراری:<br>• برداشت میوه‌های سالم<br>• قارچکش سیستمیک (آزوکسی استروبین)<br>• تخریب بوته‌های شدیداً آلوده<br>• تناوب زراعی"
            }
        ];
        
        function goToStage(stage) {
            currentStage = stage;
            let intensity = 0;
            if (stage === 0) intensity = 0;
            if (stage === 1) intensity = 0.35;
            if (stage === 2) intensity = 0.65;
            if (stage === 3) intensity = 0.95;
            
            setSeverityVisual(intensity);
            
            const data = stageDetails[stage];
            const infoDiv = document.getElementById('infoPanel');
            infoDiv.innerHTML = `
                <div class="stage-name">${data.name}</div>
                <div class="section">
                    <div class="section-title">🍃 علائم روی برگ و میوه</div>
                    <div class="section-content">${data.symptoms}</div>
                </div>
                <div class="section">
                    <div class="section-title">🧫 شرایط مساعد و چرخه بیماری</div>
                    <div class="section-content">${data.science}</div>
                </div>
                <div class="section">
                    <div class="section-title">💊 روش‌های کنترل و درمان</div>
                    <div class="section-content">${data.control}</div>
                </div>
                <hr>
                <div class="section-content highlight">🔍 <strong>تفاوت سپتوریا با بلایت زودرس:</strong><br>
                • سپتوریا: لکه‌های <strong>کوچک (۲-۵ میلی‌متر)</strong> با <strong>مرکز سفید</strong> و حاشیه قهوه‌ای<br>
                • بلایت زودرس: لکه‌های <strong>بزرگ (۵-۱۵ میلی‌متر)</strong> با <strong>حلقه‌های متحدالمرکز</strong></div>
            `;
        }
        
        const btn = document.getElementById('stageBtn');
        btn.addEventListener('click', () => {
            let next = currentStage + 1;
            if (next > 3) next = 0;
            goToStage(next);
        });
        
        goToStage(0);
    })();
</script>
</body>
</html>
