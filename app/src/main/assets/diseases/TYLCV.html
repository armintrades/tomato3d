                symptoms: "🔴 برگ: زردی شدید، پیچیدگی کامل برگ به سمت بالا، برگ‌های بسیار ریز و بدشکل، توقف کامل رشد<br>🍅 میوه: میوه بسیار ریز، زرد و بی‌کیفیت، غیرقابل فروش",
                science: "⚠️ کاهش محصول ۸۰-۱۰۰٪. گیاه عملاً میوه قابل فروش تولید نمی‌کند. ویروس توسط مگس سفید به سرعت در کل مزرعه منتشر می‌شود.",
                control: "🌱 مدیریت اضطراری:<br>• حذف کامل بوته‌های آلوده (خارج از مزرعه)<br>• کنترل شدید مگس سفید در مزارع اطراف<br>• تناوب زراعی با محصولات غیرمیزبان<br>• کشت در زمان‌های که جمعیت مگس سفید کم است"
            }
        ];
        
        function goToStage(stage) {
            currentStage = stage;
            let intensity = 0;
            if (stage === 0) intensity = 0;
            if (stage === 1) intensity = 0.35;
            if (stage === 2) intensity = 0.65;
            if (stage === 3) intensity = 0.95;
            
            setSeverityVisual(intensity);
            
            const data = stageDetails[stage];
            const infoDiv = document.getElementById('infoPanel');
            infoDiv.innerHTML = `
                <div class="stage-name">${data.name}</div>
                <div class="section">
                    <div class="section-title">🍃 علائم روی برگ و میوه</div>
                    <div class="section-content">${data.symptoms}</div>
                </div>
                <div class="section">
                    <div class="section-title">🧫 شرایط مساعد و چرخه بیماری</div>
                    <div class="section-content">${data.science}</div>
                </div>
                <div class="section">
                    <div class="section-title">💊 روش‌های کنترل و درمان</div>
                    <div class="section-content">${data.control}</div>
                </div>
                <hr>
                <div class="section-content highlight">🎯 زردی بین رگبرگ + پیچیدگی برگ به سمت بالا + ریز شدن برگ = TYLCV</div>
                <div class="section-content" style="margin-top:8px; background:#fae6c3; padding:5px; border-radius:12px;">
                    ⚠️ <strong>نکته مهم در هرمزگان:</strong> مگس سفید در هوای گرم جمعیت بالایی دارد. حتماً از تله‌های زرد چسبنده استفاده کنید و سمپاشی منظم علیه مگس سفید انجام دهید.
                </div>
            `;
        }
        
        const btn = document.getElementById('stageBtn');
        btn.addEventListener('click', () => {
            let next = currentStage + 1;
            if (next > 3) next = 0;
            goToStage(next);
        });
        
        goToStage(0);
    })();
</script>
</body>
</html>
