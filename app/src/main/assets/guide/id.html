<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🌱 دانشنامه تخصصی گوجه فرنگی | کشت در هرمزگان</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* ========== متغیرهای رنگ برای حالت روشن (لایت) ========== */
        :root {
            --bg-body: #ece5d8;
            --bg-header: linear-gradient(135deg, #2c5e2c, #1c3a1a);
            --text-header: #fff3e0;
            --card-bg: white;
            --card-border: #dfd2bd;
            --card-shadow: rgba(0,0,0,0.08);
            --text-primary: #2c2b1f;
            --text-secondary: #6f5b3e;
            --title-color: #9b4b2c;
            --modal-bg: #fffdf9;
            --modal-border: #e2caa6;
            --table-bg: #faf6ed;
            --table-header-bg: #e7ddce;
            --product-bg: #f6f2ea;
            --product-border: #e2d2bb;
            --note-bg: #fff1e0;
            --note-color: #a95b2a;
            --footer-color: #8b694a;
            --btn-bg: #e7dcc8;
            --badge-bg: #f9b23f;
            --badge-text: #2c2b1f;
            --arrow-color: #bc9862;
            --close-color: #996633;
            --section-border: #e0a82b;
            --section-text: #3a6b2f;
        }
        
        /* ========== حالت تاریک (دارک مود) ========== */
        body.dark {
            --bg-body: #1a1a1a;
            --bg-header: linear-gradient(135deg, #1a3a1a, #0f2a0f);
            --text-header: #e8dbb8;
            --card-bg: #2d2d2d;
            --card-border: #4a4a4a;
            --card-shadow: rgba(0,0,0,0.3);
            --text-primary: #e0e0e0;
            --text-secondary: #b0a090;
            --title-color: #d8895a;
            --modal-bg: #2a2a2a;
            --modal-border: #5a4a3a;
            --table-bg: #333333;
            --table-header-bg: #444444;
            --product-bg: #3a3a3a;
            --product-border: #555555;
            --note-bg: #3a2a1a;
            --note-color: #e0a07a;
            --footer-color: #b09070;
            --btn-bg: #4a4a4a;
            --badge-bg: #c57f4a;
            --badge-text: #1a1a1a;
            --arrow-color: #d8895a;
            --close-color: #d8895a;
            --section-border: #d8895a;
            --section-text: #a0c080;
        }
        
        body {
            background: var(--bg-body);
            font-family: system-ui, 'Segoe UI', 'Tahoma', sans-serif;
            padding: 16px 12px 40px;
            transition: background 0.3s ease;
        }
        .app {
            max-width: 550px;
            margin: 0 auto;
        }
        .header {
            background: var(--bg-header);
            border-radius: 38px;
            padding: 20px 14px;
            text-align: center;
            color: var(--text-header);
            margin-bottom: 24px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.2);
            position: relative;
        }
        .header h1 {
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .badge {
            background: var(--badge-bg);
            color: var(--badge-text);
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 8px;
        }
        /* دکمه دارک مود */
        .dark-mode-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50px;
            padding: 8px 12px;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-header);
            backdrop-filter: blur(4px);
        }
        .stage-card {
            background: var(--card-bg);
            border-radius: 32px;
            margin-bottom: 18px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: 0 6px 14px var(--card-shadow);
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid var(--card-border);
        }
        .stage-card:active { transform: scale(0.99); background: var(--card-bg); filter: brightness(0.98); }
        .stage-info { flex: 1; }
        .stage-title { font-size: 1.2rem; font-weight: bold; color: var(--title-color); }
        .stage-days { font-size: 0.7rem; color: var(--text-secondary); }
        .arrow { font-size: 1.6rem; color: var(--arrow-color); }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            padding: 12px;
        }
        .modal-content {
            background: var(--modal-bg);
            width: 100%;
            max-width: 530px;
            max-height: 90vh;
            border-radius: 48px;
            padding: 20px 20px 30px;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
            direction: rtl;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid var(--modal-border);
            padding-bottom: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .modal-title { font-size: 1.6rem; font-weight: bold; color: var(--title-color); }
        .close { font-size: 2rem; cursor: pointer; color: var(--close-color); line-height: 1; }
        .section { margin: 18px 0; }
        .section h3 {
            font-size: 1.1rem;
            color: var(--section-text);
            border-right: 4px solid var(--section-border);
            padding-right: 12px;
            margin-bottom: 10px;
        }
        .product-list, .checklist-list {
            background: var(--product-bg);
            padding: 10px 16px;
            border-radius: 24px;
            list-style: none;
        }
        .product-list li, .checklist-list li {
            margin: 8px 0;
            font-size: 0.85rem;
            line-height: 1.4;
            padding-right: 20px;
            position: relative;
            color: var(--text-primary);
        }
        .product-list li:before { content: "🌱"; position: absolute; right: 0; top: 0; }
        .checklist-list li:before { content: "✅"; position: absolute; right: 0; top: 0; }
        .badge-tech {
            background: var(--table-header-bg);
            display: inline-block;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.7rem;
            font-weight: bold;
            color: var(--badge-text);
            margin-bottom: 8px;
        }
        .note {
            font-size: 0.75rem;
            color: var(--note-color);
            background: var(--note-bg);
            padding: 10px;
            border-radius: 20px;
        }
        .footer-modal { text-align: center; margin-top: 20px; font-size: 0.7rem; color: var(--footer-color); }
        .copy-btn {
            background: var(--btn-bg);
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
            width: 100%;
            color: var(--text-primary);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--table-bg);
            border-radius: 24px;
            overflow: hidden;
        }
        th, td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--product-border);
            text-align: right;
            font-size: 0.8rem;
            vertical-align: top;
            color: var(--text-primary);
        }
        th { background: var(--table-header-bg); width: 40%; }
        @media (max-width: 450px) {
            .modal-title { font-size: 1.3rem; }
            .section h3 { font-size: 1rem; }
            .product-list li, td, th { font-size: 0.75rem; }
        }
    </style>
</head>

        id: 6, title: "📈 مرحله ششم: رشد میوه", days: "۶۰ – ۸۰ روز", short: "افزایش حجم و تجمع مواد جامد",
        fertilizers: ["🧪 جلبک دریایی: 2 لیتر - روز 60 و 70","🧪 آمینو اسید: 1.5 لیتر - روز 65 و 75","🧪 سولفات پتاسیم: 12 کیلو + منیزیم 5 کیلو"],
        mechanism: "پتاسیم انتقال قند، جلبک دریایی بتائین ضد تنش",
        goal: "🎯 افزایش حجم میوه، تجمع قند، پیشگیری از ترک خوردگی",
        optimal: "دمای روز 25-30°C، شب 18-22°C، EC 2.5-3.0",
        warning: "⚠️ کمبود پتاسیم = میوه بی مزه، نوسان آبیاری = ترک خوردگی",
        mix: "سولفات پتاسیم و منیزیم با هم مخلوط می‌شوند",
        fertilizerSchedule: { title: "📅 تزریق", rows: [["روز 60","سولفات پتاسیم+منیزیم"]] },
        irrigationSchedule: { title: "💧 آبیاری", rows: [["دفعات","4-5 نوبت در هفته"]] },
        checklist: { title: "✅ چک‌لیست", items: ["بررسی ترک خوردگی میوه"] }
    };
    
    // مرحله 7
    const stage7 = {
        id: 7, title: "❤️ مرحله هفتم: رنگ‌گیری و قرمزی میوه", days: "۸۰ روز تا برداشت", short: "تولید لیکوپن و رسیدگی نهایی",
        fertilizers: ["🧪 سولفات منیزیم: 5 کیلو - روز 80","🧪 ایسی لایف: 1 لیتر - روز 85","🧪 K60: 2 لیتر - روز 80 و 90"],
        mechanism: "منیزیم تجزیه کلروفیل و فعال‌سازی لیکوپن، پتاسیم افزایش شیرینی",
        goal: "🎯 تولید لیکوپن، افزایش شیرینی، رسیدگی یکنواخت",
        optimal: "دمای روز 25-30°C، شب 15-20°C، EC 2.8-3.2",
        warning: "⚠️ قطع کامل نیتروژن الزامی است، دمای بالای 35 درجه = توقف لیکوپن",
        mix: "K60 با سولفات منیزیم قابل اختلاط",
        fertilizerSchedule: { title: "📅 تزریق", rows: [["روز 80","سولفات منیزیم + K60"]] },
        irrigationSchedule: { title: "💧 آبیاری", rows: [["دفعات","2-3 نوبت در هفته"]] },
        checklist: { title: "✅ چک‌لیست", items: ["بررسی درصد قرمزی میوه"] }
    };
    
    const stagesData = [stage1, stage2, stage3, stage4, stage5, stage6, stage7];
    const container = document.getElementById("stagesList");
    const modal = document.getElementById("detailModal");
    const modalContent = document.getElementById("modalContent");

    function renderCards() {
        container.innerHTML = "";
        stagesData.forEach(s => {
            const card = document.createElement("div");
            card.className = "stage-card";
            card.innerHTML = `<div class="stage-info"><div class="stage-title">📌 مرحله ${s.id} : ${s.title}</div><div class="stage-days">⏱️ ${s.days}</div><div style="font-size:0.75rem; color:var(--text-secondary);">${s.short.substring(0,60)}...</div></div><div class="arrow">📖</div>`;
            card.addEventListener("click", () => openModal(s));
            container.appendChild(card);
        });
    }

    function openModal(stage) {
        let fertHtml = `<div class="section"><h3>🧪 کودها و مواد مصرفی</h3><ul class="product-list">`;
        if(stage.fertilizers && stage.fertilizers.length > 0){
            stage.fertilizers.forEach(f => fertHtml += `<li>${f}</li>`);
        }
        fertHtml += `</ul></div>`;
        
        let extraHtml = "";
        
        if (stage.id === 4) {
            if (stage.physiology) extraHtml += `<div class="section"><h3>🌼 شرح کامل فیزیولوژی گلدهی</h3><div class="note" style="white-space:pre-line;">${stage.physiology}</div></div>`;
            if (stage.yieldTarget) extraHtml += `<div class="section"><h3>🍅 هدف عملکرد در مرحله گلدهی</h3><div class="note" style="white-space:pre-line;">${stage.yieldTarget}</div></div>`;
            if (stage.essentialElements && stage.essentialElements.rows) {
                extraHtml += `<div class="section"><h3>${stage.essentialElements.title}</h3><table style="width:100%"><tr style="background:var(--table-header-bg);"><th>عنصر</th><th>نقش</th><th>مقدار</th></tr>`;
                stage.essentialElements.rows.forEach(row => {
                    extraHtml += `<tr><td style="padding:8px;">${row[0]}<\/td><td style="padding:8px;">${row[1]}<\/td><td style="padding:8px;">${row[2]}<\/td></tr>`;
                });
                extraHtml += `<\/table></div>`;
            }
            if (stage.fertilizerSchedule && stage.fertilizerSchedule.rows) {
                extraHtml += `<div class="section"><h3>📅 برنامه تزریق</h3><table style="width:100%"><tr style="background:var(--table-header-bg);"><th>روز</th><th>کود</th><th>مقدار</th><th>هدف</th></tr>`;
                stage.fertilizerSchedule.rows.forEach(row => {
                    extraHtml += `<tr><td>${row[0]}<\/td><td>${row[1]}<\/td><td>${row[2]}<\/td><td>${row[3] || ''}<\/td></tr>`;
                });
                extraHtml += `<\/table></div>`;
            }
            if (stage.irrigationSchedule && stage.irrigationSchedule.rows) {
                extraHtml += `<div class="section"><h3>💧 برنامه آبیاری</h3><table style="width:100%"><tr style="background:var(--table-header-bg);"><th>پارامتر</th><th>مقدار</th></tr>`;
                stage.irrigationSchedule.rows.forEach(row => {
                    extraHtml += `<tr><td>${row[0]}<\/td><td>${row[1]}<\/td></tr>`;
                });
                extraHtml += `<\/table></div>`;
            }
            if (stage.preventiveSpray && stage.preventiveSpray.rows) {
                extraHtml += `<div class="section"><h3>📅 برنامه سمپاشی</h3><table style="width:100%"><tr style="background:var(--table-header-bg);"><th>نوبت</th><th>سم</th><th>هدف</th></tr>`;
                stage.preventiveSpray.rows.forEach(row => {
                    extraHtml += `<td><td>${row[0]}<\/td><td>${row[1]}<\/td><td>${row[2]}<\/td></tr>`;
                });
                extraHtml += `<\/table></div>`;
            }
            if (stage.pestsAndDiseases && stage.pestsAndDiseases.length > 0) {
                extraHtml += `<div class="section"><h3>🐛 آفات شایع و درمان</h3><ul class="product-list">`;
                stage.pestsAndDiseases.forEach(p => extraHtml += `<li>🐜 ${p}</li>`);
                extraHtml += `</ul></div>`;
            }
            if (stage.diseasesInfo && stage.diseasesInfo.length > 0) {
                extraHtml += `<div class="section"><h3>🦠 بیماری‌های شایع و درمان</h3><ul class="product-list">`;
                stage.diseasesInfo.forEach(d => extraHtml += `<li>🍄 ${d}</li>`);
                extraHtml += `</ul></div>`;
            }
            if (stage.deficiencyTable && stage.deficiencyTable.rows) {
                extraHtml += `<div class="section"><h3>🧐 علائم کمبود</h3><table style="width:100%"><tr style="background:var(--table-header-bg);"><th>علامت</th><th>درمان</th></tr>`;
                stage.deficiencyTable.rows.forEach(row => {
                    extraHtml += `</tr><td>${row[0]}<\/td><td>${row[2]}<\/td></tr>`;
                });
                extraHtml += `<\/table></div>`;
            }
            if (stage.prohibitions && stage.prohibitions.items) {
                extraHtml += `<div class="section"><h3>🚫 ممنوعات</h3><ul class="checklist-list">`;
                stage.prohibitions.items.forEach(item => extraHtml += `<li>${item}</li>`);
                extraHtml += `</ul></div>`;
            }
            if (stage.climateGuide && stage.climateGuide.rows) {
                extraHtml += `<div class="section"><h3>🌡️ شرایط آب و هوایی بحرانی</h3><table style="width:100%"><tr style="background:var(--table-header-bg);"><th>شرایط</th><th>اقدام</th></tr>`;
                stage.climateGuide.rows.forEach(row => {
                    extraHtml += `<tr><td>${row[0]}<\/td><td>${row[1]}<\/td></tr>`;
                });
                extraHtml += `<\/table></div>`;
            }
            if (stage.weeklySchedule && stage.weeklySchedule.rows) {
                extraHtml += `<div class="section"><h3>📅 برنامه هفتگی</h3><table style="width:100%"><tr style="background:var(--table-header-bg);"><th>روز</th><th>برنامه</th></tr>`;
                stage.weeklySchedule.rows.forEach(row => {
                    extraHtml += `<tr><td style="vertical-align:top;">${row[0]}<\/td><td style="white-space:pre-line;">${row[1]}<\/td></tr>`;
                });
                extraHtml += `<\/table></div>`;
            }
            if (stage.checklist && stage.checklist.items) {
                extraHtml += `<div class="section"><h3>✅ چک‌لیست</h3><ul class="checklist-list">`;
                stage.checklist.items.forEach(item => extraHtml += `<li>${item}</li>`);
                extraHtml += `</ul></div>`;
            }
            if (stage.optimal) extraHtml += `<div class="section"><h3>🌡️ شرایط بهینه</h3><div class="note">${stage.optimal}</div></div>`;
            if (stage.warning) extraHtml += `<div class="section"><h3>⚠️ هشدارهای حیاتی</h3><div class="note">${stage.warning}</div></div>`;
            if (stage.mix) extraHtml += `<div class="section"><h3>🧫 دستور اختلاط</h3><div class="note">${stage.mix}</div></div>`;
        } else {
            if (stage.goal) extraHtml += `<div class="section"><h3>🎯 هدف فنی مرحله</h3><div class="note">${stage.goal}</div></div>`;
            if (stage.mechanism) extraHtml += `<div class="section"><h3>📖 مکانیسم علمی</h3><div class="note">${stage.mechanism}</div></div>`;
            if (stage.optimal) extraHtml += `<div class="section"><h3>🌡️ شرایط بهینه</h3><div class="note">${stage.optimal}</div></div>`;
            if (stage.warning) extraHtml += `<div class="section"><h3>⚠️ هشدارها</h3><div class="note">${stage.warning}</div></div>`;
            if (stage.mix) extraHtml += `<div class="section"><h3>🧫 دستور اختلاط</h3><div class="note">${stage.mix}</div></div>`;
        }
        
        const modalHtml = `
            <div class="modal-header"><span class="modal-title">مرحله ${stage.id} : ${stage.title}</span><span class="close" id="closeModalBtn">&times;</span></div>
            <div class="badge-tech">⏱️ ${stage.days}</div>
            <div class="section"><h3>📖 شرح فنی</h3><p style="line-height:1.5;">${stage.short}</p></div>
            ${fertHtml}
            ${extraHtml}
            <button class="copy-btn" id="copyModalBtn">📋 کپی متن این مرحله</button>
            <div class="footer-modal">🌾 دانشنامه تخصصی مزرعه گوجه (توکهور و هشتبندی)</div>
        `;
        
        modalContent.innerHTML = modalHtml;
        modal.style.display = "flex";
        document.getElementById("closeModalBtn").onclick = () => modal.style.display = "none";
        modal.onclick = (e) => { if(e.target === modal) modal.style.display = "none"; };
        document.getElementById("copyModalBtn").onclick = () => {
            let txt = `${stage.title}\n${stage.days}\n${stage.short}\nکودها:\n${stage.fertilizers.join("\n")}`;
            navigator.clipboard.writeText(txt).then(() => alert("📋 کپی شد"));
        };
    }
    
    renderCards();
</script>
</body>
</html>
