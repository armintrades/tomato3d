          <li><strong>مینوز برگ:</strong> سییرومازین ۵۰۰ گرم</li></ul></div>` },
        { id:8, title:"فصل ۸: برداشت و پس از برداشت", summary:"برداشت صبح زود، درجه‌بندی، بسته‌بندی، نگهداری در ۱۲-۱۵ درجه",
          detail:`<div class='section-detail'><h4>⏰ نکات برداشت</h4><ul class='list-mini'><li>برداشت وقتی قرمز یکدست (۸۰-۹۰%)، با قیچی و کاسبرگ</li><li>درجه یک: لوکس، درجه دو: بازاری، درجه سه: صنعتی</li><li>دمای نگهداری ۱۲-۱۵ درجه، رطوبت ۸۵-۹۰%</li><li>قطع آبیاری ۱۰ روز قبل از برداشت نهایی برای شیرینی بیشتر</li></ul></div>` },
        { id:9, title:"فصل ۹: پاسخ به سوالات رایج", summary:"۲۰ سوال مهم: زمان قطع نیتروژن، علت ترک خوردگی، شیرینی، کمبود کلسیم، تفاوت کودهای پتاسیم",
          detail:`<div class='section-detail'><h4>❓ منتخب سوالات</h4><ul class='list-mini'><li><strong>زمان قطع نیتروژن؟</strong> هفته ۱۲ (شروع رسیدگی)</li>
          <li><strong>ترک خوردگی میوه؟</strong> آبیاری نامنظم یا نیتروژن زیاد</li>
          <li><strong>ریز ماندن میوه؟</strong> کمبود پتاسیم، هرس نکردن پاجوش</li>
          <li><strong>شیرینی کم؟</strong> پتاسیم کم، نیتروژن زیاد در رسیدگی</li>
          <li><strong>کمبود کلسیم؟</strong> پوسیدگی گلگاه → نیترات کلسیم محلول‌پاشی</li></ul></div>` },
        { id:10, title:"فصل ۱۰: جمع‌بندی نهایی و تقویم یک صفحه‌ای", summary:"خلاصه همه جداول، قانون‌های طلایی، چک‌لیست روزانه و هفتگی",
          detail:`<div class='section-detail'><h4>📌 قانون‌های طلایی</h4><ul class='list-mini'><li>۱. نیتروژن را از هفته ۱۲ قطع کن</li><li>۲. پتاسیم را هیچ وقت قطع نکن</li><li>۳. کلسیم را هفته ۶ تا ۱۲ حتماً بده</li><li>۴. هر هفته پاجوش بزن</li><li>۵. سمپاشی پیشگیرانه هر ۲ هفته</li><li>۶. آبیاری صبح زود</li><li>۷. داربست بزن (عملکرد ×۲)</li><li>۸. تناوب زراعی ۳ سال</li></ul></div>` }
    ];

    // رندر مراحل
    const stagesContainer = document.getElementById("stagesList");
    function renderStages() {
        stagesContainer.innerHTML = "";
        stagesData.forEach(s => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<div class="card-info"><h3>📌 مرحله ${s.id} : ${s.title}</h3><p>⏱️ ${s.days} | ${s.short.substring(0,50)}</p></div><div class="arrow">📖</div>`;
            card.addEventListener("click", () => openStageModal(s));
            stagesContainer.appendChild(card);
        });
    }

    function openStageModal(stage) {
        let fertHtml = `<div class='section-detail'><h4>🧪 کودها</h4><ul class='list-mini'>`;
        stage.fertilizers.forEach(f => fertHtml += `<li>🌱 ${f}</li>`);
        fertHtml += `</ul></div>`;
        let foliarHtml = stage.foliar ? `<div class='section-detail'><h4>💧 محلول‌پاشی</h4><ul class='list-mini'><li>✨ ${stage.foliar}</li></ul></div>` : "";
        const modalHtml = `
            <div class="modal-header"><span class="modal-title">مرحله ${stage.id} : ${stage.title}</span><span class="close-modal" id="closeModalBtn">&times;</span></div>
            <div class="badge-tech" style="background:#d9e2c0; display:inline-block; padding:2px 10px; border-radius:20px;">⏱️ ${stage.days}</div>
            <div class='section-detail'><h4>📖 شرح فنی</h4><p>${stage.short} — ${stage.mechanism}</p></div>
            ${fertHtml}${foliarHtml}
            <div class='section-detail'><h4>🌡️ شرایط بهینه</h4><ul class='list-mini'><li>🔬 ${stage.optimal}</li></ul></div>
            <div class='section-detail'><h4>⚠️ هشدارها</h4><ul class='list-mini'><li>⚠️ ${stage.warning}</li></ul></div>
            ${stage.mix ? `<div class='section-detail'><h4>🧫 دستور اختلاط</h4><ul class='list-mini'><li>🔁 ${stage.mix}</li></ul></div>` : ""}
            <button class="copy-btn" id="copyModalBtn">📋 کپی متن</button>
            <div class="footer-modal">🌾 منبع: دانشنامه مهندسی گوجه یارا</div>
        `;
        document.getElementById("modalContent").innerHTML = modalHtml;
        const modal = document.getElementById("detailModal");
        modal.style.display = "flex";
        document.getElementById("closeModalBtn").onclick = () => modal.style.display = "none";
        modal.onclick = (e) => { if(e.target === modal) modal.style.display = "none"; };
        document.getElementById("copyModalBtn").onclick = () => {
            let txt = `${stage.title}\n${stage.days}\n${stage.short}\nکودها: ${stage.fertilizers.join(", ")}\n${stage.mechanism}`;
            navigator.clipboard.writeText(txt).then(() => alert("کپی شد"));
        };
    }

    // رندر فصول
    const chaptersContainer = document.getElementById("chaptersList");
    function renderChapters() {
        chaptersContainer.innerHTML = "";
        chaptersData.forEach(ch => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<div class="card-info"><h3>📘 ${ch.title}</h3><p>${ch.summary.substring(0,70)}...</p></div><div class="arrow">📖</div>`;
            card.addEventListener("click", () => openChapterModal(ch));
            chaptersContainer.appendChild(card);
        });
    }

    function openChapterModal(ch) {
        const modalHtml = `
            <div class="modal-header"><span class="modal-title">${ch.title}</span><span class="close-modal" id="closeModalBtnCh">&times;</span></div>
            ${ch.detail}
            <button class="copy-btn" id="copyModalBtnCh">📋 کپی متن خلاصه</button>
            <div class="footer-modal">🌾 بر اساس جزوه تخصصی رقم یارا</div>
        `;
        document.getElementById("modalContent").innerHTML = modalHtml;
        const modal = document.getElementById("detailModal");
        modal.style.display = "flex";
        document.getElementById("closeModalBtnCh").onclick = () => modal.style.display = "none";
        modal.onclick = (e) => { if(e.target === modal) modal.style.display = "none"; };
        document.getElementById("copyModalBtnCh").onclick = () => {
            let text = `${ch.title}\n${ch.summary}`;
            navigator.clipboard.writeText(text).then(() => alert("کپی شد"));
        };
    }

    // تب‌ها
    const tabBtns = document.querySelectorAll(".tab-btn");
    const sections = { stages: document.getElementById("stagesSection"), chapters: document.getElementById("chaptersSection") };
    tabBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            tabBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            const which = btn.getAttribute("data-tab");
            sections.stages.classList.remove("active-section");
            sections.chapters.classList.remove("active-section");
            if (which === "stages") sections.stages.classList.add("active-section");
            else sections.chapters.classList.add("active-section");
        });
    });

    renderStages();
    renderChapters();
</script>
</body>
</html>
