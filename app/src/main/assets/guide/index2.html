        * {

        }

            width: 100%; height: 100%;

            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            padding: 12px;
        }

            font-size: 1.6rem;
            font-weight: bold;
            color: #a3411e;
        }

            color: #996633;

            line-height: 1.4;

            content: "🌱";
            position: absolute;
            right: 0;
            top: 0;
        }
        .checklist-list li:before {
            content: "✅";
            position: absolute;
            right: 0;
            top: 0;
        }

            background: #d9e2c0;
            display: inline-block;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #2c4b1e;
            margin-bottom: 8px;

            color: #a95b2a;
            background: #fff1e0;
            padding: 10px;
            border-radius: 20px;
        }
        .footer-modal {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #8b694a;

            background: #e7dcc8;

            font-size: 0.75rem;
            font-weight: bold;

            background: #faf6ed;
            border-radius: 24px;

        }
        th, td {
            padding: 10px 8px;
            border-bottom: 1px solid #e2d2bb;
            text-align: right;
            font-size: 0.8rem;
            vertical-align: top;
        }
        th {
            background: #e7ddce;
            width: 40%;
        }
        @media (max-width: 450px) {
            .modal-title { font-size: 1.3rem; }
            .section h3 { font-size: 1rem; }
            .product-list li, td, th { font-size: 0.75rem; }
        }
    </style>
</head>
