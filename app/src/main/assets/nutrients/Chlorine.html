<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>برگ گوجه فرنگی - کمبود کلر (Cl) | آموزش کامل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1b3d2a, #0d2a1a);
            font-family: 'Segoe UI', 'Vazirmatn', Tahoma, system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .master {
            max-width: 750px;
            width: 100%;
            background: #27261cd9;
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 12px;
            box-shadow: 0 12px 28px black;
        }
        .card {
            background: #fef8ec;
            border-radius: 1.8rem;
            padding: 1rem;
            box-shadow: inset 0 0 0 1px #fff9e8, 0 6px 14px rgba(0,0,0,0.2);
        }
        .title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: #2b7220;
            text-shadow: 1px 1px 0 #e2f0cf;
        }
        .sub {
            text-align: center;
            font-size: 0.75rem;
            color: #b47c44;
            border-bottom: 2px dashed #dabd88;
            display: inline-block;
            width: auto;
            margin: 0 auto 12px auto;
            padding-bottom: 4px;
        }
        .svg-container {
            background: #e7ddc4;
            border-radius: 1.2rem;
            padding: 8px;
            text-align: center;
            margin: 8px 0;
            box-shadow: inset 0 0 0 2px #fef5e2, 0 4px 10px rgba(0,0,0,0.15);
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        svg {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 1rem;
        }
        .button-area {
            display: flex;
            justify-content: center;
            margin: 12px 0;
        }
        button {
            background: #c08545;
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 2rem;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        button:active {
            transform: scale(0.96);
        }
        .info-panel {
            background: #efe4cf;
            border-radius: 1.2rem;
            padding: 0.9rem;
            margin-top: 12px;
            border-right: 5px solid #aa7942;
            text-align: right;
            font-size: 0.75rem;
            max-height: 55vh;
            overflow-y: auto;
        }
        .stage-name {
            font-size: 1rem;
            font-weight: bold;
            color: #4a3920;
            background: #fdf1df;
            padding: 4px 10px;
            border-radius: 2rem;
            display: inline-block;
            margin-bottom: 8px;
        }
        .section {
            margin-top: 10px;
            background: #faf3e3;
            padding: 8px;
            border-radius: 1rem;
        }
        .section-title {
            font-weight: bold;
            color: #6b3f1c;
            border-right: 3px solid #c6904b;
            padding-right: 8px;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }
        .section-content {
            line-height: 1.45;
            color: #2c2a1a;
        }
        hr {
            margin: 8px 0;
            border-color: #dbbc87;
        }
        .highlight {
            background: #f5e6c4;
            padding: 2px 6px;
            border-radius: 12px;
            font-weight: bold;
        }
        .warning-box {
            background: #fae6c3;
            border-right: 4px solid #c67a2e;
            padding: 6px 10px;
            border-radius: 12px;
            margin-top: 8px;
            font-size: 0.7rem;
        }
        footer {
            text-align: center;
            font-size: 0.6rem;
            color: #aa956b;
            margin-top: 10px;
        }
        @media (max-width: 500px) {
            .master { padding: 8px; }
            .card { padding: 0.7rem; }
            .title { font-size: 1.2rem; }
            .info-panel { font-size: 0.7rem; max-height: 50vh; }
            .section-title { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="master">
    <div class="card">
        <div class="title">🍅 برگ گوجه‌فرنگی | کمبود کلر (Cl)</div>
        <div style="text-align: center;"><div class="sub">پژمردگی + برنز شدن حاشیه + کلروز خفیف</div></div>

        <div class="svg-container">
            <svg id="tomatoLeafSvg" viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
                        <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#2d2a1a" flood-opacity="0.25"/>
                    </filter>
                    <filter id="veinGlow"><feGaussianBlur stdDeviation="1"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    <linearGradient id="leafGrad" x1="20%" y1="0%" x2="80%" y2="100%">
                        <stop offset="0%" stop-color="#6daa44"/><stop offset="60%" stop-color="#468a2e"/><stop offset="100%" stop-color="#2d6b1e"/>
                    </linearGradient>
                    <linearGradient id="petioleGrad" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#8b744b"/><stop offset="100%" stop-color="#b4925e"/>
                    </linearGradient>
                </defs>
                <g filter="url(#shadow)">
                    <!-- دمبرگ Petiole -->
                    <path id="petiolePath" d="M300,510 C285,545 270,585 285,640 Q295,670 310,685" stroke="url(#petioleGrad)" stroke-width="14" fill="none" stroke-linecap="round"/>
                    <path id="petioleInner" d="M300,510 C310,540 325,585 312,640" stroke="#b7975f" stroke-width="3" fill="none" opacity="0.5"/>

                    <!-- پهنک برگ -->
                    <g id="leafGroup">
                        <path id="leafBlade" d="M300,160 C340,175 375,200 405,240 C425,268 442,298 448,330 C452,358 450,385 440,410 C425,445 400,475 372,500 C355,514 335,525 312,525 C290,525 270,514 253,500 C225,475 200,445 185,410 C175,385 173,358 177,330 C183,298 200,268 220,240 C250,200 285,175 300,160Z" fill="url(#leafGrad)" stroke="#3e6827" stroke-width="1.8"/>

                        <!-- پژمردگی برگ (wilting) - افتادگی شبیه کمبود آب -->
                        <g id="leafWilting" opacity="0">
                            <path d="M340,175 Q360,220 345,270" stroke="#7a8a5a" stroke-width="1.5" fill="none" opacity="0.5"/>
                            <path d="M375,200 Q395,250 380,300" stroke="#7a8a5a" stroke-width="1.5" fill="none" opacity="0.5"/>
                            <path d="M280,175 Q260,220 275,270" stroke="#7a8a5a" stroke-width="1.5" fill="none" opacity="0.5"/>
                            <path d="M245,200 Q225,250 240,300" stroke="#7a8a5a" stroke-width="1.5" fill="none" opacity="0.5"/>
                        </g>

                        <!-- کلروز خفیف (زردی ملایم) -->
                        <g id="mildChlorosis" opacity="0">
                            <ellipse cx="340" cy="280" rx="25" ry="20" fill="#e0d55a" opacity="0.45"/>
                            <ellipse cx="380" cy="350" rx="22" ry="25" fill="#ddd055" opacity="0.4"/>
                            <ellipse cx="270" cy="320" rx="24" ry="22" fill="#e0d55a" opacity="0.4"/>
                            <ellipse cx="310" cy="400" rx="28" ry="20" fill="#ddd055" opacity="0.35"/>
                        </g>

                        <!-- برنز شدن و نکروز حاشیه برگ -->
                        <g id="bronzeMargin" opacity="0">
                            <path d="M405,240 C430,280 448,330 445,380" stroke="#b87a45" stroke-width="10" fill="none" opacity="0.65" stroke-linecap="round"/>
                            <path d="M220,240 C195,280 177,330 180,380" stroke="#b87a45" stroke-width="10" fill="none" opacity="0.65" stroke-linecap="round"/>
                            <ellipse cx="300" cy="165" rx="12" ry="8" fill="#b87a45" opacity="0.6"/>
                            <!-- لکه‌های برنزی پراکنده -->
                            <ellipse cx="350" cy="310" rx="8" ry="6" fill="#a86a35" opacity="0.5"/>
                            <ellipse cx="270" cy="370" rx="7" ry="5" fill="#a86a35" opacity="0.45"/>
                            <ellipse cx="390" cy="400" rx="9" ry="6" fill="#a86a35" opacity="0.4"/>
                        </g>

                        <!-- نکروز پیشرفته -->
                        <g id="advancedNecrosis" opacity="0">
                            <path d="M410,260 C435,300 448,350 440,400" stroke="#7a4e2a" stroke-width="8" fill="none" opacity="0.7" stroke-linecap="round"/>
                            <path d="M210,260 C185,300 172,350 180,400" stroke="#7a4e2a" stroke-width="8" fill="none" opacity="0.7" stroke-linecap="round"/>
                            <ellipse cx="300" cy="160" rx="14" ry="9" fill="#7a4e2a" opacity="0.7"/>
                        </g>

                        <!-- رگبرگ اصلی -->
                        <path id="midVein" d="M300,170 Q293,280 300,520" stroke="#5b953c" stroke-width="4.5" fill="none" stroke-linecap="round" filter="url(#veinGlow)"/>
                        <path id="midVeinInner" d="M300,170 Q295,280 300,520" stroke="#a3df78" stroke-width="1.4" fill="none"/>

                        <!-- رگبرگ فرعی -->
                        <g id="veinsGroup" stroke="#4b8231" fill="none" stroke-linecap="round">
                            <path d="M300,210 Q330,225 355,240" stroke-width="2.6"/><path d="M300,210 Q270,225 245,240" stroke-width="2.6"/>
                            <path d="M300,260 Q345,275 385,295" stroke-width="2.8"/><path d="M300,260 Q255,275 215,295" stroke-width="2.8"/>
                            <path d="M300,320 Q355,340 410,365" stroke-width="3"/><path d="M300,320 Q245,340 190,365" stroke-width="3"/>
                            <path d="M300,380 Q350,395 395,425" stroke-width="2.6"/><path d="M300,380 Q250,395 205,425" stroke-width="2.6"/>
                            <path d="M300,440 Q335,455 365,485" stroke-width="2.4"/><path d="M300,440 Q265,455 235,485" stroke-width="2.4"/>
                            <path d="M345,270 Q370,280 395,272" stroke-width="1.2" opacity="0.75"/><path d="M255,270 Q230,280 205,272" stroke-width="1.2" opacity="0.75"/>
                            <path d="M360,330 Q390,340 425,330" stroke-width="1.3" opacity="0.8"/><path d="M240,330 Q210,340 175,330" stroke-width="1.3" opacity="0.8"/>
                        </g>

                        <!-- تریکوم -->
                        <g id="trichomesGroup" stroke="#b6a467" fill="none" stroke-width="0.8" opacity="0.9">
                            <path d="M380,230 L390,225"/><circle cx="390" cy="225" r="1.1" fill="#cfb572"/>
                            <path d="M410,280 L422,272"/><circle cx="422" cy="272" r="1.2" fill="#cfb572"/>
                            <path d="M435,340 L448,332"/><circle cx="448" cy="332" r="1.2" fill="#cfb572"/>
                            <path d="M420,400 L433,395"/><circle cx="433" cy="395" r="1.1" fill="#cfb572"/>
                            <path d="M380,460 L390,455"/><circle cx="390" cy="455" r="1.1" fill="#cfb572"/>
                            <path d="M220,230 L210,225"/><circle cx="210" cy="225" r="1.1" fill="#cfb572"/>
                            <path d="M190,280 L178,272"/><circle cx="178" cy="272" r="1.2" fill="#cfb572"/>
                            <path d="M165,340 L152,332"/><circle cx="152" cy="332" r="1.2" fill="#cfb572"/>
                            <path d="M180,400 L168,395"/><circle cx="168" cy="395" r="1.1" fill="#cfb572"/>
                            <path d="M220,460 L210,455"/><circle cx="210" cy="455" r="1.1" fill="#cfb572"/>
                        </g>

                        <!-- روزنه‌ها -->
                        <g id="stomataGroup" fill="#6a8c50" opacity="0.4">
                            <ellipse cx="340" cy="260" rx="1.3" ry="2" transform="rotate(15 340 260)"/>
                            <ellipse cx="320" cy="290" rx="1.2" ry="1.9" transform="rotate(-20 320 290)"/>
                            <ellipse cx="370" cy="310" rx="1.4" ry="2.1" transform="rotate(30 370 310)"/>
                            <ellipse cx="290" cy="330" rx="1.3" ry="2" transform="rotate(-10 290 330)"/>
                            <ellipse cx="410" cy="350" rx="1.2" ry="1.9" transform="rotate(10 410 350)"/>
                            <ellipse cx="220" cy="280" rx="1.4" ry="2.1" transform="rotate(-25 220 280)"/>
                            <ellipse cx="260" cy="400" rx="1.3" ry="2" transform="rotate(5 260 400)"/>
                            <ellipse cx="350" cy="430" rx="1.2" ry="1.9" transform="rotate(20 350 430)"/>
                        </g>
                    </g>
                </g>
            </svg>
        </div>

        <div class="button-area">
            <button id="stageBtn">🌱 مراحل کمبود کلر (سالم ← شدید)</button>
        </div>

        <div class="info-panel" id="infoPanel">
            <!-- محتوای داینامیک توسط JS پر می‌شود -->
        </div>
        <footer>🔍 هر بار کلیک، شدت کمبود کلر افزایش می‌یابد. علائم: پژمردگی، زردی خفیف، برنز شدن و نکروز حاشیه.</footer>
    </div>
</div>

<script>
    (function() {
        // گرفتن المان‌های SVG
        const leafGrad = document.getElementById('leafGrad');
        const leafWilting = document.getElementById('leafWilting');
        const mildChlorosis = document.getElementById('mildChlorosis');
        const bronzeMargin = document.getElementById('bronzeMargin');
        const advancedNecrosis = document.getElementById('advancedNecrosis');
        const midVein = document.getElementById('midVein');
        const veinsGroup = document.getElementById('veinsGroup');
        const trichomesGroup = document.getElementById('trichomesGroup');
        const petiolePath = document.getElementById('petiolePath');
        
        let currentStage = 0;  // 0:سالم, 1:خفیف, 2:متوسط, 3:شدید
        
        function setSeverityVisual(severity) {
            // کمبود کلر: پژمردگی و زردی خفیف
            const hue = 85 - severity * 15;
            const sat = 55 - severity * 10;
            const light = 42 - severity * 8;
            const stops = leafGrad.querySelectorAll('stop');
            if (stops.length >= 3) {
                stops[0].setAttribute('stop-color', `hsl(${hue}, ${sat}%, ${light+5}%)`);
                stops[1].setAttribute('stop-color', `hsl(${hue-4}, ${sat-4}%, ${light-2}%)`);
                stops[2].setAttribute('stop-color', `hsl(${hue-8}, ${sat-8}%, ${light-6}%)`);
            }
            
            // پژمردگی (علامت اصلی)
            let wiltOp = severity * 0.85;
            leafWilting.setAttribute('opacity', Math.min(0.75, wiltOp).toString());
            
            // کلروز خفیف
            let chloroOp = severity * 0.7;
            mildChlorosis.setAttribute('opacity', Math.min(0.6, chloroOp).toString());
            
            // برنز شدن حاشیه
            let bronzeOp = (severity > 0.3) ? (severity - 0.3) * 1.1 : 0;
            bronzeMargin.setAttribute('opacity', Math.min(0.8, bronzeOp).toString());
            
            // نکروز پیشرفته
            let necroOp = (severity > 0.6) ? (severity - 0.6) * 1.5 : 0;
            advancedNecrosis.setAttribute('opacity', Math.min(0.8, necroOp).toString());
            
            // رگبرگ‌ها
            const veinColor = (severity > 0.7) ? "#8a9a5a" : "#5b953c";
            midVein.setAttribute('stroke', veinColor);
            const allVeins = veinsGroup.querySelectorAll('path');
            allVeins.forEach(p => p.setAttribute('stroke', (severity > 0.7) ? "#8a9a5a" : "#4b8231"));
            
            // دمبرگ
            if (severity > 0.6) {
                petiolePath.setAttribute('stroke', "#9a8050");
            } else {
                petiolePath.setAttribute('stroke', "url(#petioleGrad)");
            }
            
            // تریکوم
            trichomesGroup.setAttribute('stroke', severity > 0.5 ? "#a08f58" : "#b6a467");
        }
        
        const stageDetails = [
            {
                name: "🌿 مرحله ۰: برگ کاملاً سالم (بدون کمبود کلر)",
                glossary: "✅ <strong>تعریف اجزای برگ:</strong><br> • <strong>پهنک برگ (Blade):</strong> قسمت سبز و پهن که عمل فتوسنتز را انجام می‌دهد.<br> • <strong>دمبرگ (Petiole):</strong> ساقه‌ای که برگ را به ساقه اصلی متصل می‌کند.<br> • <strong>رگبرگ اصلی (Midvein):</strong> رگ ضخیم وسط برگ.<br> • <strong>رگبرگ فرعی (Secondary Veins):</strong> انشعابات ریزتر.<br> • <strong>تریکوم (Trichomes):</strong> کرک‌های ریز غده‌ای محافظ.<br> • <strong>روزنه (Stomata):</strong> منافذ ریز برای تبادل گاز.<br><br>🧪 <strong>کلر (Cl) چه کاری انجام می‌دهد؟</strong><br> کلر برای فتوسنتز (تجزیه آب در فتوسیستم II)، تنظیم اسمزی و باز و بسته شدن روزنه‌ها ضروری است. در گیاه سالم، برگ‌ها شاداب، بدون پژمردگی و سبز طبیعی هستند.",
                symptoms: "🔹 <strong>علائم قابل مشاهده:</strong> سبزی یکدست، برگ‌ها شاداب و بدون پژمردگی، بدون برنز شدگی، رشد طبیعی.",
                science: "📗 <strong>علت فیزیولوژیک:</strong> کلر کافی در دسترس است. فتوسنتز به خوبی انجام می‌شود، روزنه‌ها به درستی کار می‌کنند، تعادل آبی گیاه حفظ می‌شود."
            },
            {
                name: "⚠️ مرحله ۱: کمبود خفیف کلر (آغاز علائم)",
                glossary: "همان اجزای بالا – اکنون پژمردگی خفیف و زردی ملایم برگ دیده می‌شود.",
                symptoms: "🥀 برگ‌ها کمی پژمرده به نظر می‌رسند (حتی با آبیاری کافی). زردی خفیف در برگ‌های جوان. رشد کمی کاهش یافته. هنوز برنز شدگی دیده نمی‌شود.",
                science: "🔬 <strong>دلیل علمی:</strong> کلر برای باز و بسته شدن روزنه‌ها ضروری است. با کاهش کلر، روزنه‌ها به درستی کار نمی‌کنند ← از دست دادن آب ← پژمردگی. فتوسنتز نیز کمی کاهش می‌یابد."
            },
            {
                name: "🥀 مرحله ۲: کمبود متوسط کلر (علائم آشکار)",
                glossary: "تمامی اجزا – اکنون پژمردگی واضح، برنز شدن حاشیه و کلروز خفیف ظاهر شده است.",
                symptoms: "پژمردگی واضح برگ‌ها (برگ‌ها افتاده و بی‌حال). حاشیه برگ برنز و قهوه‌ای می‌شود. زردی خفیف بین رگبرگی. ریشه‌ها ضعیف و کوتاه. رشد متوقف شده.",
                science: "🧪 <strong>دلیل علمی:</strong> کمبود کلر متوسط: تعادل اسمزی سلول‌ها به هم می‌خورد. روزنه‌ها غیرفعال ← کاهش تعرق و فتوسنتز. کمبود آب در سلول‌های حاشیه ← برنز شدن و نکروز."
            },
            {
                name: "🔴 مرحله ۳: کمبود شدید کلر (پیشرفته، بحرانی)",
                glossary: "همه قسمت‌های برگ درگیر: پژمردگی شدید، نکروز گسترده حاشیه، کلروز عمومی.",
                symptoms: "پژمردگی شدید برگ‌ها (برگ‌ها افتاده و خشک). نکروز قهوه‌ای گسترده حاشیه و نوک برگ. زردی عمومی در کل برگ. رشد کامل متوقف. گیاه بسیار ضعیف و مستعد بیماری. ریشه‌ها نکروزه.",
                science: "⚠️ <strong>دلیل علمی:</strong> کمبود حاد کلر: فتوسنتز متوقف، تنظیم اسمزی مختل شده، سلول‌ها آب خود را از دست می‌دهند. مرگ سلول‌های حاشیه برگ گسترش می‌یابد. گیاه توانایی جذب آب و مواد را از دست می‌دهد."
            }
        ];
        
        function goToStage(stage) {
            currentStage = stage;
            let intensity = 0;
            if (stage === 0) intensity = 0;
            if (stage === 1) intensity = 0.35;
            if (stage === 2) intensity = 0.65;
            if (stage === 3) intensity = 0.95;
            
            setSeverityVisual(intensity);
            
            const data = stageDetails[stage];
            const infoDiv = document.getElementById('infoPanel');
            infoDiv.innerHTML = `
                <div class="stage-name">${data.name}</div>
                <div class="section">
                    <div class="section-title">📖 آموزش اجزای برگ و نقش کلر</div>
                    <div class="section-content">${data.glossary}</div>
                </div>
                <div class="section">
                    <div class="section-title">🔍 علائم ظاهری در این مرحله (کمبود کلر)</div>
                    <div class="section-content">${data.symptoms}</div>
                </div>
                <div class="section">
                    <div class="section-title">🧠 علت علمی (فیزیولوژی کمبود کلر)</div>
                    <div class="section-content">${data.science}</div>
                </div>
                <div class="warning-box">
                    💡 <span class="highlight">نکته مهم - علائم اختصاصی کمبود کلر:</span><br>
                    • <strong>پژمردگی برگ حتی با آبیاری کافی</strong> (اختلال در عملکرد روزنه)<br>
                    • <strong>برنز شدن و نکروز حاشیه برگ</strong><br>
                    • <strong>کلروز خفیف و عمومی</strong><br>
                    • ریشه‌های ضعیف و کوتاه
                </div>
                <div class="warning-box" style="margin-top:6px;">
                    🧪 <span class="highlight">نکته مهم - کمبود کلر بسیار نادر است:</span><br>
                    کلر در آب باران، آب آبیاری و کودها به وفور یافت می‌شود. کمبود کلر معمولاً فقط در خاک‌های شنی بسیار شسته شده یا در شرایط استفاده از آب خالص (اسمز معکوس) دیده می‌شود. راه حل: کلرید پتاسیم (KCl) یا کلرید کلسیم (CaCl₂) در مقادیر بسیار کم.
                </div>
                <hr>
                <div class="section-content" style="font-size:0.7rem; color:#5c481f;">
                    💡 با هر کلیک، شدت کمبود کلر افزایش می‌یابد. در مراحل شدید، برگ‌ها پژمرده، حاشیه سوخته و نکروزه می‌شوند.
                </div>
            `;
        }
        
        const btn = document.getElementById('stageBtn');
        btn.addEventListener('click', () => {
            let next = currentStage + 1;
            if (next > 3) next = 0;
            goToStage(next);
        });
        
        goToStage(0);
    })();
</script>
</body>
</html>
