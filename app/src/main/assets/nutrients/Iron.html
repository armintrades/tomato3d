<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>برگ گوجه فرنگی - کمبود آهن (Fe) | آموزش کامل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1b3d2a, #0d2a1a);
            font-family: 'Segoe UI', 'Vazirmatn', Tahoma, system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .master {
            max-width: 750px;
            width: 100%;
            background: #27261cd9;
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 12px;
            box-shadow: 0 12px 28px black;
        }
        .card {
            background: #fef8ec;
            border-radius: 1.8rem;
            padding: 1rem;
            box-shadow: inset 0 0 0 1px #fff9e8, 0 6px 14px rgba(0,0,0,0.2);
        }
        .title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: #2b7220;
            text-shadow: 1px 1px 0 #e2f0cf;
        }
        .sub {
            text-align: center;
            font-size: 0.75rem;
            color: #b47c44;
            border-bottom: 2px dashed #dabd88;
            display: inline-block;
            width: auto;
            margin: 0 auto 12px auto;
            padding-bottom: 4px;
        }
        .svg-container {
            background: #e7ddc4;
            border-radius: 1.2rem;
            padding: 8px;
            text-align: center;
            margin: 8px 0;
            box-shadow: inset 0 0 0 2px #fef5e2, 0 4px 10px rgba(0,0,0,0.15);
        }
        svg {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 1rem;
        }
        .button-area {
            display: flex;
            justify-content: center;
            margin: 12px 0;
        }
        button {
            background: #c08545;
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 2rem;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        button:active {
            transform: scale(0.96);
        }
        .info-panel {
            background: #efe4cf;
            border-radius: 1.2rem;
            padding: 0.9rem;
            margin-top: 12px;
            border-right: 5px solid #aa7942;
            text-align: right;
            font-size: 0.75rem;
            max-height: 55vh;
            overflow-y: auto;
        }
        .stage-name {
            font-size: 1rem;
            font-weight: bold;
            color: #4a3920;
            background: #fdf1df;
            padding: 4px 10px;
            border-radius: 2rem;
            display: inline-block;
            margin-bottom: 8px;
        }
        .section {
            margin-top: 10px;
            background: #faf3e3;
            padding: 8px;
            border-radius: 1rem;
        }
        .section-title {
            font-weight: bold;
            color: #6b3f1c;
            border-right: 3px solid #c6904b;
            padding-right: 8px;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }
        .section-content {
            line-height: 1.45;
            color: #2c2a1a;
        }
        hr {
            margin: 8px 0;
            border-color: #dbbc87;
        }
        .highlight {
            background: #f5e6c4;
            padding: 2px 6px;
            border-radius: 12px;
            font-weight: bold;
        }
        .warning-box {
            background: #fae6c3;
            border-right: 4px solid #c67a2e;
            padding: 6px 10px;
            border-radius: 12px;
            margin-top: 8px;
            font-size: 0.7rem;
        }
        footer {
            text-align: center;
            font-size: 0.6rem;
            color: #aa956b;
            margin-top: 10px;
        }
        @media (max-width: 500px) {
            .master { padding: 8px; }
            .card { padding: 0.7rem; }
            .title { font-size: 1.2rem; }
            .info-panel { font-size: 0.7rem; max-height: 50vh; }
            .section-title { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="master">
    <div class="card">
        <div class="title">🍅 برگ گوجه‌فرنگی | کمبود آهن (Fe)</div>
        <div style="text-align: center;"><div class="sub">آموزش کامل اجزا و علائم از سالم تا شدید</div></div>

        <div class="svg-container">
            <svg id="tomatoLeafSvg" viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
                        <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#2d2a1a" flood-opacity="0.25"/>
                    </filter>
                    <filter id="veinGlow"><feGaussianBlur stdDeviation="1"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    <linearGradient id="leafGrad" x1="20%" y1="0%" x2="80%" y2="100%">
                        <stop offset="0%" stop-color="#6daa44"/><stop offset="60%" stop-color="#468a2e"/><stop offset="100%" stop-color="#2d6b1e"/>
                    </linearGradient>
                    <linearGradient id="petioleGrad" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#8b744b"/><stop offset="100%" stop-color="#b4925e"/>
                    </linearGradient>
                </defs>
                <g filter="url(#shadow)">
                    <!-- دمبرگ Petiole -->
                    <path id="petiolePath" d="M300,510 C285,545 270,585 285,640 Q295,670 310,685" stroke="url(#petioleGrad)" stroke-width="14" fill="none" stroke-linecap="round"/>
                    <path id="petioleInner" d="M300,510 C310,540 325,585 312,640" stroke="#b7975f" stroke-width="3" fill="none" opacity="0.5"/>

                    <!-- پهنک برگ Blade -->
                    <path id="leafBlade" d="M300,160 C340,175 375,200 405,240 C425,268 442,298 448,330 C452,358 450,385 440,410 C425,445 400,475 372,500 C355,514 335,525 312,525 C290,525 270,514 253,500 C225,475 200,445 185,410 C175,385 173,358 177,330 C183,298 200,268 220,240 C250,200 285,175 300,160Z" fill="url(#leafGrad)" stroke="#3e6827" stroke-width="1.8"/>

                    <!-- کلروز بین رگبرگی در برگ جوان (علامت اصلی کمبود آهن) -->
                    <g id="interveinalChlorosis" opacity="0">
                        <!-- لکه‌های زرد روشن بین رگبرگ‌ها در بخش بالایی برگ -->
                        <ellipse cx="330" cy="220" rx="25" ry="18" fill="#f0e886" opacity="0.7"/>
                        <ellipse cx="370" cy="260" rx="28" ry="22" fill="#e8df6a" opacity="0.65"/>
                        <ellipse cx="290" cy="240" rx="26" ry="20" fill="#f0e886" opacity="0.65"/>
                        <ellipse cx="410" cy="300" rx="22" ry="25" fill="#e8df6a" opacity="0.55"/>
                        <ellipse cx="230" cy="290" rx="20" ry="22" fill="#e8df6a" opacity="0.55"/>
                        <ellipse cx="350" cy="310" rx="30" ry="20" fill="#e0d55a" opacity="0.5"/>
                        <ellipse cx="270" cy="330" rx="28" ry="22" fill="#e0d55a" opacity="0.5"/>
                    </g>

                    <!-- سفید شدن برگ در کمبود شدید آهن -->
                    <g id="whiteChlorosis" opacity="0">
                        <ellipse cx="330" cy="220" rx="35" ry="25" fill="#faf5c0" opacity="0.7"/>
                        <ellipse cx="370" cy="270" rx="30" ry="28" fill="#faf0b0" opacity="0.6"/>
                        <ellipse cx="290" cy="250" rx="32" ry="24" fill="#faf5c0" opacity="0.65"/>
                        <ellipse cx="350" cy="310" rx="40" ry="25" fill="#f5eba8" opacity="0.55"/>
                        <ellipse cx="270" cy="340" rx="35" ry="28" fill="#f5eba8" opacity="0.55"/>
                    </g>

                    <!-- نکروز (در کمبود شدید آهن - نادر) -->
                    <g id="necrosisGroup" opacity="0">
                        <ellipse cx="350" cy="280" rx="8" ry="6" fill="#8a5a2a" opacity="0.5"/>
                        <ellipse cx="310" cy="350" rx="10" ry="7" fill="#8a5a2a" opacity="0.45"/>
                    </g>

                    <!-- رگبرگ اصلی (سبز می‌ماند - کنتراست بالا) -->
                    <path id="midVein" d="M300,170 Q293,280 300,520" stroke="#5b953c" stroke-width="4.5" fill="none" stroke-linecap="round" filter="url(#veinGlow)"/>
                    <path id="midVeinInner" d="M300,170 Q295,280 300,520" stroke="#a3df78" stroke-width="1.4" fill="none"/>

                    <!-- رگبرگ فرعی (سبز می‌ماند) -->
                    <g id="veinsGroup" stroke="#4b8231" fill="none" stroke-linecap="round">
                        <path d="M300,210 Q330,225 355,240" stroke-width="2.6"/><path d="M300,210 Q270,225 245,240" stroke-width="2.6"/>
                        <path d="M300,260 Q345,275 385,295" stroke-width="2.8"/><path d="M300,260 Q255,275 215,295" stroke-width="2.8"/>
                        <path d="M300,320 Q355,340 410,365" stroke-width="3"/><path d="M300,320 Q245,340 190,365" stroke-width="3"/>
                        <path d="M300,380 Q350,395 395,425" stroke-width="2.6"/><path d="M300,380 Q250,395 205,425" stroke-width="2.6"/>
                        <path d="M300,440 Q335,455 365,485" stroke-width="2.4"/><path d="M300,440 Q265,455 235,485" stroke-width="2.4"/>
                        <path d="M345,270 Q370,280 395,272" stroke-width="1.2" opacity="0.75"/><path d="M255,270 Q230,280 205,272" stroke-width="1.2" opacity="0.75"/>
                        <path d="M360,330 Q390,340 425,330" stroke-width="1.3" opacity="0.8"/><path d="M240,330 Q210,340 175,330" stroke-width="1.3" opacity="0.8"/>
                    </g>

                    <!-- تریکوم (کرک‌های غده‌ای) -->
                    <g id="trichomesGroup" stroke="#b6a467" fill="none" stroke-width="0.8" opacity="0.9">
                        <path d="M380,230 L390,225"/><circle cx="390" cy="225" r="1.1" fill="#cfb572"/>
                        <path d="M410,280 L422,272"/><circle cx="422" cy="272" r="1.2" fill="#cfb572"/>
                        <path d="M435,340 L448,332"/><circle cx="448" cy="332" r="1.2" fill="#cfb572"/>
                        <path d="M420,400 L433,395"/><circle cx="433" cy="395" r="1.1" fill="#cfb572"/>
                        <path d="M380,460 L390,455"/><circle cx="390" cy="455" r="1.1" fill="#cfb572"/>
                        <path d="M220,230 L210,225"/><circle cx="210" cy="225" r="1.1" fill="#cfb572"/>
                        <path d="M190,280 L178,272"/><circle cx="178" cy="272" r="1.2" fill="#cfb572"/>
                        <path d="M165,340 L152,332"/><circle cx="152" cy="332" r="1.2" fill="#cfb572"/>
                        <path d="M180,400 L168,395"/><circle cx="168" cy="395" r="1.1" fill="#cfb572"/>
                        <path d="M220,460 L210,455"/><circle cx="210" cy="455" r="1.1" fill="#cfb572"/>
                    </g>

                    <!-- روزنه‌ها (نقاط میکروسکوپی) -->
                    <g id="stomataGroup" fill="#6a8c50" opacity="0.4">
                        <ellipse cx="340" cy="260" rx="1.3" ry="2" transform="rotate(15 340 260)"/>
                        <ellipse cx="320" cy="290" rx="1.2" ry="1.9" transform="rotate(-20 320 290)"/>
                        <ellipse cx="370" cy="310" rx="1.4" ry="2.1" transform="rotate(30 370 310)"/>
                        <ellipse cx="290" cy="330" rx="1.3" ry="2" transform="rotate(-10 290 330)"/>
                        <ellipse cx="410" cy="350" rx="1.2" ry="1.9" transform="rotate(10 410 350)"/>
                        <ellipse cx="220" cy="280" rx="1.4" ry="2.1" transform="rotate(-25 220 280)"/>
                        <ellipse cx="260" cy="400" rx="1.3" ry="2" transform="rotate(5 260 400)"/>
                        <ellipse cx="350" cy="430" rx="1.2" ry="1.9" transform="rotate(20 350 430)"/>
                    </g>
                </g>
            </svg>
        </div>

        <div class="button-area">
            <button id="stageBtn">🌱 مراحل کمبود آهن (سالم ← شدید)</button>
        </div>

        <div class="info-panel" id="infoPanel">
            <!-- محتوای داینامیک توسط JS پر می‌شود -->
        </div>
        <footer>🔍 هر بار کلیک، شدت کمبود آهن افزایش می‌یابد. علائم: زردی شدید بین رگبرگی در برگ‌های جوان، سفید شدن در موارد شدید.</footer>
    </div>
</div>

<script>
    (function() {
        // گرفتن المان‌های SVG
        const leafGrad = document.getElementById('leafGrad');
        const interveinalChlorosis = document.getElementById('interveinalChlorosis');
        const whiteChlorosis = document.getElementById('whiteChlorosis');
        const necrosisGroup = document.getElementById('necrosisGroup');
        const midVein = document.getElementById('midVein');
        const midVeinInner = document.getElementById('midVeinInner');
        const veinsGroup = document.getElementById('veinsGroup');
        const trichomesGroup = document.getElementById('trichomesGroup');
        const petiolePath = document.getElementById('petiolePath');
        
        let currentStage = 0;  // 0:سالم, 1:خفیف, 2:متوسط, 3:شدید
        
        // تابع تغییر ظاهر SVG بر اساس شدت کمبود آهن (0 تا 1)
        function setSeverityVisual(severity) {
            // کمبود آهن: زردی بسیار روشن بین رگبرگ‌ها در برگ جوان
            // رنگ کلی برگ روشن و زرد می‌شود
            const hue = 85 - severity * 30;   // از سبز به زرد لیمویی
            const sat = 55 - severity * 20;
            const light = 42 + severity * 15;  // بسیار روشن می‌شود
            const stops = leafGrad.querySelectorAll('stop');
            if (stops.length >= 3) {
                stops[0].setAttribute('stop-color', `hsl(${hue}, ${sat}%, ${light+5}%)`);
                stops[1].setAttribute('stop-color', `hsl(${hue-5}, ${sat-5}%, ${light}%)`);
                stops[2].setAttribute('stop-color', `hsl(${hue-10}, ${sat-10}%, ${light-5}%)`);
            }
            
            // کلروز بین رگبرگی (علامت اصلی)
            let interveinalOp = severity * 0.85;
            interveinalChlorosis.setAttribute('opacity', Math.min(0.9, interveinalOp).toString());
            
            // سفید شدن برگ (در شدت‌های بالا)
            let whiteOp = (severity > 0.6) ? (severity - 0.6) * 1.8 : 0;
            whiteChlorosis.setAttribute('opacity', Math.min(0.8, whiteOp).toString());
            
            // نکروز (فقط در شدت خیلی زیاد)
            let necroOp = (severity > 0.85) ? (severity - 0.85) * 2.5 : 0;
            necrosisGroup.setAttribute('opacity', Math.min(0.5, necroOp).toString());
            
            // رگبرگ‌ها سبز می‌مانند (کنتراست بالا)
            const veinColor = "#5b953c";
            midVein.setAttribute('stroke', veinColor);
            midVeinInner.setAttribute('stroke', "#a3df78");
            
            const allVeins = veinsGroup.querySelectorAll('path');
            allVeins.forEach(p => p.setAttribute('stroke', "#4b8231"));
            
            // دمبرگ
            if (severity > 0.7) {
                petiolePath.setAttribute('stroke', "#a08050");
            } else {
                petiolePath.setAttribute('stroke', "url(#petioleGrad)");
            }
            
            // تریکوم
            trichomesGroup.setAttribute('stroke', severity > 0.5 ? "#a88f58" : "#b6a467");
        }
        
        // داده‌های توضیحی برای هر مرحله (کمبود آهن)
        const stageDetails = [
            { // مرحله 0: سالم
                name: "🌿 مرحله ۰: برگ کاملاً سالم (بدون کمبود آهن)",
                glossary: "✅ <strong>تعریف اجزای برگ:</strong><br> • <strong>پهنک برگ (Blade):</strong> قسمت سبز و پهن که عمل فتوسنتز را انجام می‌دهد.<br> • <strong>دمبرگ (Petiole):</strong> ساقه‌ای که برگ را به ساقه اصلی متصل می‌کند.<br> • <strong>رگبرگ اصلی (Midvein):</strong> رگ ضخیم وسط برگ برای انتقال آب و مواد.<br> • <strong>رگبرگ فرعی (Secondary Veins):</strong> انشعابات ریزتر برای رساندن مواد به تمام بافت.<br> • <strong>تریکوم (Trichomes):</strong> کرک‌های ریز غده‌ای محافظ.<br> • <strong>روزنه (Stomata):</strong> منافذ ریز برای تبادل گاز و تعرق.<br><br>🧪 <strong>آهن (Fe) چه کاری انجام می‌دهد؟</strong><br> آهن برای سنتز کلروفیل و عملکرد آنزیم‌های تنفسی ضروری است. اگرچه آهن جز ساختار کلروفیل نیست، اما برای تولید آن حیاتی است. در گیاه سالم، برگ‌ها سبز و شاداب هستند.",
                symptoms: "🔹 <strong>علائم قابل مشاهده:</strong> سبزی یکدست و طبیعی در همه برگ‌ها. بدون زردی بین رگبرگی، رشد طبیعی.",
                science: "📗 <strong>علت فیزیولوژیک:</strong> آهن کافی در دسترس است. آنزیم‌های سنتز کلروفیل به خوبی کار می‌کنند، فتوسنتز بهینه. برگ حالت سالم دارد."
            },
            { // مرحله 1: خفیف
                name: "⚠️ مرحله ۱: کمبود خفیف آهن (آغاز علائم در برگ جوان)",
                glossary: "همان اجزای بالا – اکنون زردی خفیف بین رگبرگ‌ها در برگ‌های جوان دیده می‌شود.",
                symptoms: "🟡 برگ‌های جوان (بالایی) زردی خفیف بین رگبرگ‌ها نشان می‌دهند. رگبرگ‌ها هنوز سبز هستند. برگ‌های پایینی طبیعی به نظر می‌رسند. رشد کمی کاهش یافته.",
                science: "🔬 <strong>دلیل علمی:</strong> آهن در گیاه غیر متحرک است (بر خلاف نیتروژن). بنابراین برگ‌های جوان اولین جایی هستند که کمبود را نشان می‌دهند. آهن برای سنتز کلروفیل ضروری است ← کاهش کلروفیل در بافت بین رگبرگ."
            },
            { // مرحله 2: متوسط
                name: "🟡 مرحله ۲: کمبود متوسط آهن (علائم آشکار)",
                glossary: "تمامی اجزا – اکنون زردی شدید بین رگبرگ‌ها با کنتراست بالا دیده می‌شود.",
                symptoms: "زردی شدید بین رگبرگ‌ها در برگ‌های جوان تا میانی. رگبرگ‌ها به طور مشخص سبز باقی می‌مانند (کنتراست بالا). برگ‌ها ممکن است تقریباً زرد به نظر برسند. رشد متوقف شده، گیاه کوتوله می‌ماند.",
                science: "🧪 <strong>دلیل علمی:</strong> کمبود آهن متوسط: آنزیم‌های سنتز کلروفیل غیرفعال شده‌اند. بافت بین رگبرگ تقریباً فاقد کلروفیل است اما رگبرگ‌ها به دلیل ساختار خاص، آهن بیشتری حفظ می‌کنند. فتوسنتز به شدت کاهش یافته."
            },
            { // مرحله 3: شدید
                name: "⚪ مرحله ۳: کمبود شدید آهن (پیشرفته، بحرانی)",
                glossary: "همه قسمت‌های برگ درگیر: برگ‌های جوان سفید تا زرد کمرنگ، نکروز خفیف ممکن است ظاهر شود.",
                symptoms: "برگ‌های جوان سفید یا زرد بسیار کمرنگ. برگ‌های مسن نیز زرد می‌شوند. نوک ساقه ممکن است بمیرد. رشد کامل متوقف. در موارد بسیار شدید، نکروز خفیف ظاهر می‌شود.",
                science: "⚠️ <strong>دلیل علمی:</strong> کمبود حاد آهن: سنتز کلروفیل تقریباً متوقف شده است. فتوسنتز غیرفعال، گیاه قادر به تولید انرژی نیست. مریستم انتهایی آسیب دیده، برگ‌های جدید سفید و بدون کلروفیل می‌شوند. گیاه در آستانه مرگ است."
            }
        ];
        
        // تابع به‌روزرسانی پنل متن و ظاهر برگ
        function goToStage(stage) {
            currentStage = stage;
            let intensity = 0;
            if (stage === 0) intensity = 0;
            if (stage === 1) intensity = 0.35;
            if (stage === 2) intensity = 0.65;
            if (stage === 3) intensity = 0.95;
            
            setSeverityVisual(intensity);
            
            const data = stageDetails[stage];
            const infoDiv = document.getElementById('infoPanel');
            infoDiv.innerHTML = `
                <div class="stage-name">${data.name}</div>
                <div class="section">
                    <div class="section-title">📖 آموزش اجزای برگ و نقش آهن</div>
                    <div class="section-content">${data.glossary}</div>
                </div>
                <div class="section">
                    <div class="section-title">🔍 علائم ظاهری در این مرحله (کمبود آهن)</div>
                    <div class="section-content">${data.symptoms}</div>
                </div>
                <div class="section">
                    <div class="section-title">🧠 علت علمی (فیزیولوژی کمبود آهن)</div>
                    <div class="section-content">${data.science}</div>
                </div>
                <div class="warning-box">
                    💡 <span class="highlight">نکته مهم - تفاوت کمبود آهن و منیزیم:</span><br>
                    • <strong>آهن:</strong> علائم اول در <strong>برگ‌های جوان</strong> (بالایی) – غیر متحرک<br>
                    • <strong>منیزیم:</strong> علائم اول در <strong>برگ‌های پیر</strong> (پایینی) – متحرک<br>
                    • هر دو زردی بین رگبرگی ایجاد می‌کنند، اما محل ظهور متفاوت است.
                </div>
                <div class="warning-box" style="margin-top:6px;">
                    🧪 <span class="highlight">علت شایع کمبود آهن در ایران:</span><br>
                    خاک‌های آهکی (بیشتر مناطق ایران) آهن را قفل می‌کنند. حتی اگر خاک آهن داشته باشد، گیاه نمی‌تواند جذب کند. راه حل: استفاده از کلات آهن (Fe-EDDHA).
                </div>
                <hr>
                <div class="section-content" style="font-size:0.7rem; color:#5c481f;">
                    💡 با هر کلیک، شدت کمبود آهن افزایش می‌یابد. پس از مرحله شدید، دوباره به حالت سالم برمی‌گردد.
                </div>
            `;
        }
        
        // دکمه: چرخه بین مراحل 0 تا 3
        const btn = document.getElementById('stageBtn');
        btn.addEventListener('click', () => {
            let next = currentStage + 1;
            if (next > 3) next = 0;
            goToStage(next);
        });
        
        // مقدار اولیه: سالم (مرحله 0)
        goToStage(0);
    })();
</script>
</body>
</html>
