<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>برگ گوجه فرنگی - کمبود منیزیم (Mg) | آموزش کامل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1b3d2a, #0d2a1a);
            font-family: 'Segoe UI', 'Vazirmatn', Tahoma, system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .master {
            max-width: 750px;
            width: 100%;
            background: #27261cd9;
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 12px;
            box-shadow: 0 12px 28px black;
        }
        .card {
            background: #fef8ec;
            border-radius: 1.8rem;
            padding: 1rem;
            box-shadow: inset 0 0 0 1px #fff9e8, 0 6px 14px rgba(0,0,0,0.2);
        }
        .title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: #2b7220;
            text-shadow: 1px 1px 0 #e2f0cf;
        }
        .sub {
            text-align: center;
            font-size: 0.75rem;
            color: #b47c44;
            border-bottom: 2px dashed #dabd88;
            display: inline-block;
            width: auto;
            margin: 0 auto 12px auto;
            padding-bottom: 4px;
        }
        .svg-container {
            background: #e7ddc4;
            border-radius: 1.2rem;
            padding: 8px;
            text-align: center;
            margin: 8px 0;
            box-shadow: inset 0 0 0 2px #fef5e2, 0 4px 10px rgba(0,0,0,0.15);
        }
        svg {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 1rem;
        }
        .button-area {
            display: flex;
            justify-content: center;
            margin: 12px 0;
        }
        button {
            background: #c08545;
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 2rem;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        button:active {
            transform: scale(0.96);
        }
        .info-panel {
            background: #efe4cf;
            border-radius: 1.2rem;
            padding: 0.9rem;
            margin-top: 12px;
            border-right: 5px solid #aa7942;
            text-align: right;
            font-size: 0.75rem;
            max-height: 55vh;
            overflow-y: auto;
        }
        .stage-name {
            font-size: 1rem;
            font-weight: bold;
            color: #4a3920;
            background: #fdf1df;
            padding: 4px 10px;
            border-radius: 2rem;
            display: inline-block;
            margin-bottom: 8px;
        }
        .section {
            margin-top: 10px;
            background: #faf3e3;
            padding: 8px;
            border-radius: 1rem;
        }
        .section-title {
            font-weight: bold;
            color: #6b3f1c;
            border-right: 3px solid #c6904b;
            padding-right: 8px;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }
        .section-content {
            line-height: 1.45;
            color: #2c2a1a;
        }
        hr {
            margin: 8px 0;
            border-color: #dbbc87;
        }
        footer {
            text-align: center;
            font-size: 0.6rem;
            color: #aa956b;
            margin-top: 10px;
        }
        @media (max-width: 500px) {
            .master { padding: 8px; }
            .card { padding: 0.7rem; }
            .title { font-size: 1.2rem; }
            .info-panel { font-size: 0.7rem; max-height: 50vh; }
            .section-title { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="master">
    <div class="card">
        <div class="title">🍅 برگ گوجه‌فرنگی | کمبود منیزیم (Mg)</div>
        <div style="text-align: center;"><div class="sub">آموزش کامل اجزا و علائم از سالم تا شدید</div></div>

        <div class="svg-container">
            <svg id="tomatoLeafSvg" viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
                        <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#2d2a1a" flood-opacity="0.25"/>
                    </filter>
                    <filter id="veinGlow"><feGaussianBlur stdDeviation="1"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    <linearGradient id="leafGrad" x1="20%" y1="0%" x2="80%" y2="100%">
                        <stop offset="0%" stop-color="#6daa44"/><stop offset="60%" stop-color="#468a2e"/><stop offset="100%" stop-color="#2d6b1e"/>
                    </linearGradient>
                    <linearGradient id="petioleGrad" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#8b744b"/><stop offset="100%" stop-color="#b4925e"/>
                    </linearGradient>
                    <!-- الگوی لکه‌های کلروتیک بین رگبرگی -->
                    <pattern id="chloroticPattern" width="12" height="12" patternUnits="userSpaceOnUse">
                        <rect width="12" height="12" fill="#e0c33e" opacity="0.3"/>
                    </pattern>
                </defs>
                <g filter="url(#shadow)">
                    <!-- دمبرگ Petiole -->
                    <path id="petiolePath" d="M300,510 C285,545 270,585 285,640 Q295,670 310,685" stroke="url(#petioleGrad)" stroke-width="14" fill="none" stroke-linecap="round"/>
                    <path d="M300,510 C310,540 325,585 312,640" stroke="#b7975f" stroke-width="3" fill="none" opacity="0.5"/>

                    <!-- پهنک برگ Blade -->
                    <path id="leafBlade" d="M300,160 C340,175 375,200 405,240 C425,268 442,298 448,330 C452,358 450,385 440,410 C425,445 400,475 372,500 C355,514 335,525 312,525 C290,525 270,514 253,500 C225,475 200,445 185,410 C175,385 173,358 177,330 C183,298 200,268 220,240 C250,200 285,175 300,160Z" fill="url(#leafGrad)" stroke="#3e6827" stroke-width="1.8"/>

                    <!-- کلروز بین رگبرگی (زردی بین رگبرگ‌ها) - علامت اصلی کمبود منیزیم -->
                    <g id="interveinalChlorosis" opacity="0">
                        <!-- لکه‌های زرد بین رگبرگ‌های اصلی -->
                        <ellipse cx="350" cy="280" rx="30" ry="25" fill="#e5c94b" opacity="0.65"/>
                        <ellipse cx="390" cy="350" rx="28" ry="30" fill="#e0c33e" opacity="0.6"/>
                        <ellipse cx="270" cy="290" rx="32" ry="28" fill="#ddbf3a" opacity="0.55"/>
                        <ellipse cx="330" cy="420" rx="35" ry="25" fill="#dbb730" opacity="0.5"/>
                        <ellipse cx="250" cy="380" rx="30" ry="22" fill="#e8cf5a" opacity="0.5"/>
                        <ellipse cx="380" cy="450" rx="25" ry="20" fill="#dbb62e" opacity="0.45"/>
                        <ellipse cx="220" cy="330" rx="28" ry="25" fill="#e3c649" opacity="0.5"/>
                        
                        <!-- کلروز شدیدتر بین رگبرگ‌های فرعی -->
                        <ellipse cx="340" cy="240" rx="20" ry="15" fill="#f0d85a" opacity="0.55"/>
                        <ellipse cx="260" cy="260" rx="22" ry="18" fill="#f0d85a" opacity="0.55"/>
                        <ellipse cx="370" cy="390" rx="24" ry="18" fill="#e8cf5a" opacity="0.5"/>
                        <ellipse cx="240" cy="410" rx="26" ry="20" fill="#e8cf5a" opacity="0.5"/>
                    </g>

                    <!-- حاشیه سبز برگ که در کمبود منیزیم باقی می‌ماند -->
                    <g id="greenMargin" opacity="0">
                        <path d="M405,240 C425,268 442,298 448,330 C452,358 450,385 440,410 C425,445 400,475 372,500" 
                              stroke="#468a2e" stroke-width="10" fill="none" opacity="0.8"/>
                        <path d="M220,240 C200,268 183,298 177,330 C173,358 175,385 185,410 C200,445 225,475 253,500" 
                              stroke="#468a2e" stroke-width="10" fill="none" opacity="0.8"/>
                        <!-- حاشیه سبز نوک برگ -->
                        <ellipse cx="300" cy="165" rx="30" ry="12" fill="none" stroke="#468a2e" stroke-width="6" opacity="0.7"/>
                    </g>

                    <!-- نکروز قهوه‌ای (در مراحل پیشرفته کمبود منیزیم) -->
                    <g id="necrosisAdvanced" opacity="0">
                        <ellipse cx="350" cy="280" rx="14" ry="10" fill="#8a4524" opacity="0.6"/>
                        <ellipse cx="270" cy="320" rx="12" ry="9" fill="#8a4524" opacity="0.6"/>
                        <ellipse cx="390" cy="380" rx="15" ry="10" fill="#7a3e1c" opacity="0.5"/>
                        <ellipse cx="230" cy="360" rx="13" ry="9" fill="#7a3e1c" opacity="0.5"/>
                    </g>

                    <!-- رگبرگ اصلی (سبز می‌ماند) -->
                    <path id="midVein" d="M300,170 Q293,280 300,520" stroke="#5b953c" stroke-width="4.5" fill="none" stroke-linecap="round" filter="url(#veinGlow)"/>
                    <path d="M300,170 Q295,280 300,520" stroke="#a3df78" stroke-width="1.4" fill="none"/>

                    <!-- رگبرگ فرعی (سبز می‌ماند) -->
                    <g id="veinsGroup" stroke="#4b8231" fill="none" stroke-linecap="round">
                        <path d="M300,210 Q330,225 355,240" stroke-width="2.6"/><path d="M300,210 Q270,225 245,240" stroke-width="2.6"/>
                        <path d="M300,260 Q345,275 385,295" stroke-width="2.8"/><path d="M300,260 Q255,275 215,295" stroke-width="2.8"/>
                        <path d="M300,320 Q355,340 410,365" stroke-width="3"/><path d="M300,320 Q245,340 190,365" stroke-width="3"/>
                        <path d="M300,380 Q350,395 395,425" stroke-width="2.6"/><path d="M300,380 Q250,395 205,425" stroke-width="2.6"/>
                        <path d="M300,440 Q335,455 365,485" stroke-width="2.4"/><path d="M300,440 Q265,455 235,485" stroke-width="2.4"/>
                        <path d="M345,270 Q370,280 395,272" stroke-width="1.2" opacity="0.75"/><path d="M255,270 Q230,280 205,272" stroke-width="1.2" opacity="0.75"/>
                        <path d="M360,330 Q390,340 425,330" stroke-width="1.3" opacity="0.8"/><path d="M240,330 Q210,340 175,330" stroke-width="1.3" opacity="0.8"/>
                    </g>

                    <!-- تریکوم (کرک‌های غده‌ای) -->
                    <g id="trichomesGroup" stroke="#b6a467" fill="none" stroke-width="0.8" opacity="0.9">
                        <path d="M380,230 L390,225"/><circle cx="390" cy="225" r="1.1" fill="#cfb572"/>
                        <path d="M410,280 L422,272"/><circle cx="422" cy="272" r="1.2" fill="#cfb572"/>
                        <path d="M435,340 L448,332"/><circle cx="448" cy="332" r="1.2" fill="#cfb572"/>
                        <path d="M420,400 L433,395"/><circle cx="433" cy="395" r="1.1" fill="#cfb572"/>
                        <path d="M380,460 L390,455"/><circle cx="390" cy="455" r="1.1" fill="#cfb572"/>
                        <path d="M220,230 L210,225"/><circle cx="210" cy="225" r="1.1" fill="#cfb572"/>
                        <path d="M190,280 L178,272"/><circle cx="178" cy="272" r="1.2" fill="#cfb572"/>
                        <path d="M165,340 L152,332"/><circle cx="152" cy="332" r="1.2" fill="#cfb572"/>
                        <path d="M180,400 L168,395"/><circle cx="168" cy="395" r="1.1" fill="#cfb572"/>
                        <path d="M220,460 L210,455"/><circle cx="210" cy="455" r="1.1" fill="#cfb572"/>
                    </g>

                    <!-- روزنه‌ها (نقاط میکروسکوپی) -->
                    <g id="stomataGroup" fill="#6a8c50" opacity="0.4">
                        <ellipse cx="340" cy="260" rx="1.3" ry="2" transform="rotate(15 340 260)"/>
                        <ellipse cx="320" cy="290" rx="1.2" ry="1.9" transform="rotate(-20 320 290)"/>
                        <ellipse cx="370" cy="310" rx="1.4" ry="2.1" transform="rotate(30 370 310)"/>
                        <ellipse cx="290" cy="330" rx="1.3" ry="2" transform="rotate(-10 290 330)"/>
                        <ellipse cx="410" cy="350" rx="1.2" ry="1.9" transform="rotate(10 410 350)"/>
                        <ellipse cx="220" cy="280" rx="1.4" ry="2.1" transform="rotate(-25 220 280)"/>
                        <ellipse cx="260" cy="400" rx="1.3" ry="2" transform="rotate(5 260 400)"/>
                        <ellipse cx="350" cy="430" rx="1.2" ry="1.9" transform="rotate(20 350 430)"/>
                    </g>
                </g>
            </svg>
        </div>

        <div class="button-area">
            <button id="stageBtn">🌱 مراحل کمبود منیزیم (سالم ← شدید)</button>
        </div>

        <div class="info-panel" id="infoPanel">
            <!-- محتوای داینامیک توسط JS پر می‌شود -->
        </div>
        <footer>🔍 هر بار کلیک، شدت کمبود منیزیم افزایش می‌یابد. علائم: زردی بین رگبرگی (رگبرگ‌ها سبز می‌مانند)، حاشیه سبز برگ.</footer>
    </div>
</div>

<script>
    (function() {
        // گرفتن المان‌های SVG
        const leafGrad = document.getElementById('leafGrad');
        const interveinalChlorosis = document.getElementById('interveinalChlorosis');
        const greenMargin = document.getElementById('greenMargin');
        const necrosisAdvanced = document.getElementById('necrosisAdvanced');
        const midVein = document.getElementById('midVein');
        const veinsGroup = document.getElementById('veinsGroup');
        const trichomesGroup = document.getElementById('trichomesGroup');
        const petiolePath = document.getElementById('petiolePath');
        
        let currentStage = 0;  // 0:سالم, 1:خفیف, 2:متوسط, 3:شدید
        
        // تابع تغییر ظاهر SVG بر اساس شدت کمبود منیزیم (0 تا 1)
        function setSeverityVisual(severity) {
            // کمبود منیزیم: برگ ابتدا بین رگبرگ‌ها زرد می‌شود، رگبرگ‌ها سبز می‌مانند
            // رنگ کلی برگ کمی روشن‌تر می‌شود
            const hue = 90 - severity * 10;
            const sat = 55 - severity * 8;
            const light = 42 - severity * 6;
            const stops = leafGrad.querySelectorAll('stop');
            if (stops.length >= 3) {
                stops[0].setAttribute('stop-color', `hsl(${hue}, ${sat}%, ${light+5}%)`);
                stops[1].setAttribute('stop-color', `hsl(${hue-3}, ${sat-3}%, ${light-1}%)`);
                stops[2].setAttribute('stop-color', `hsl(${hue-6}, ${sat-5}%, ${light-5}%)`);
            }
            
            // کلروز بین رگبرگی (علامت اصلی)
            let interveinalOp = severity * 0.9;
            interveinalChlorosis.setAttribute('opacity', Math.min(0.85, interveinalOp).toString());
            
            // حاشیه سبز (در کمبود منیزیم حاشیه سبز می‌ماند)
            let marginOp = (severity > 0.2) ? (severity - 0.2) * 1.1 : 0;
            greenMargin.setAttribute('opacity', Math.min(0.8, marginOp).toString());
            
            // نکروز قهوه‌ای (در شدت‌های بالا)
            let necroOp = (severity > 0.6) ? (severity - 0.6) * 1.5 : 0;
            necrosisAdvanced.setAttribute('opacity', Math.min(0.7, necroOp).toString());
            
            // رگبرگ‌ها سبز می‌مانند (علت اصلی کمبود منیزیم - زردی بین رگبرگی با حفظ سبزی رگبرگ‌ها)
            const veinColor = "#5b953c";  // رگبرگ‌ها همیشه سبز می‌مانند
            midVein.setAttribute('stroke', veinColor);
            const allVeins = veinsGroup.querySelectorAll('path');
            allVeins.forEach(p => p.setAttribute('stroke', "#4b8231"));
            
            // دمبرگ در شدت بالا ضعیف‌تر
            if (severity > 0.7) {
                petiolePath.setAttribute('stroke', "#9e7548");
            } else {
                petiolePath.setAttribute('stroke', "url(#petioleGrad)");
            }
            
            // تریکوم
            trichomesGroup.setAttribute('stroke', severity > 0.5 ? "#a88f58" : "#b6a467");
        }
        
        // داده‌های توضیحی برای هر مرحله (کمبود منیزیم)
        const stageDetails = [
            { // مرحله 0: سالم
                name: "🌿 مرحله ۰: برگ کاملاً سالم (بدون کمبود منیزیم)",
                glossary: "✅ <strong>تعریف اجزای برگ:</strong><br> • <strong>پهنک برگ (Blade):</strong> قسمت سبز و پهن که عمل فتوسنتز را انجام می‌دهد.<br> • <strong>دمبرگ (Petiole):</strong> ساقه‌ای که برگ را به ساقه اصلی متصل می‌کند.<br> • <strong>رگبرگ اصلی (Midvein):</strong> رگ ضخیم وسط برگ برای انتقال آب و مواد.<br> • <strong>رگبرگ فرعی (Secondary Veins):</strong> انشعابات ریزتر برای رساندن مواد به تمام بافت.<br> • <strong>تریکوم (Trichomes):</strong> کرک‌های ریز غده‌ای محافظ.<br> • <strong>روزنه (Stomata):</strong> منافذ ریز برای تبادل گاز و تعرق.<br> • <strong>کلروز بین رگبرگی (Interveinal Chlorosis):</strong> زردی بافت بین رگبرگ‌ها – در حالت سالم دیده نمی‌شود.<br><br>🧪 <strong>منیزیم (Mg) چه کاری انجام می‌دهد؟</strong><br> منیزیم اتم مرکزی مولکول کلروفیل (رنگ سبز) است. همچنین فعال‌کننده بسیاری از آنزیم‌های حیاتی در فتوسنتز است. در گیاه سالم، برگ‌ها سبز پررنگ و شاداب هستند.",
                symptoms: "🔹 <strong>علائم قابل مشاهده:</strong> سبزی یکدست و پررنگ، رگبرگ‌ها و بافت بین آن‌ها هر دو سبز. بدون زردی بین رگبرگی، بدون نکروز.",
                science: "📗 <strong>علت فیزیولوژیک:</strong> منیزیم کافی در دسترس است. کلروفیل به مقدار کافی ساخته می‌شود، فتوسنتز بهینه، آنزیم‌های مرتبط با انتقال انرژی فعال هستند. برگ حالت سالم و طبیعی دارد."
            },
            { // مرحله 1: خفیف
                name: "⚠️ مرحله ۱: کمبود خفیف منیزیم (آغاز علائم)",
                glossary: "همان اجزای بالا – اکنون زردی خفیف بین رگبرگ‌های برگ‌های پایینی دیده می‌شود.",
                symptoms: "🟡 برگ‌های پیر (پایینی) زردی خفیف بین رگبرگ‌ها نشان می‌دهند. رگبرگ‌ها هنوز سبز هستند. رشد طبیعی به نظر می‌رسد. حاشیه برگ هنوز سبز است.",
                science: "🔬 <strong>دلیل علمی:</strong> منیزیم جز متحرکی است و در کمبود، گیاه آن را از برگ‌های پیر به جوان منتقل می‌کند. بنابراین برگ‌های پایینی اولین جایی هستند که زردی بین رگبرگی نشان می‌دهند. کلروفیل در بافت‌های بین رگبرگ کاهش می‌یابد."
            },
            { // مرحله 2: متوسط
                name: "🟡 مرحله ۲: کمبود متوسط منیزیم (علائم آشکار)",
                glossary: "تمامی اجزا – اکنون زردی گسترده بین رگبرگ‌ها و حاشیه سبز مشخص دیده می‌شود.",
                symptoms: "زردی واضح بین رگبرگ‌ها در برگ‌های پایینی و میانی. رگبرگ‌ها کاملاً سبز باقی می‌مانند (تضاد رنگی شدید). حاشیه برگ سبز می‌ماند. برگ‌ها ممکن است کمی به سمت بالا قوس بردارند. رشد کاهش یافته.",
                science: "🧪 <strong>دلیل علمی:</strong> منیزیم به شدت کاهش یافته. کلروفیل در بخش‌های بین رگبرگ تجزیه شده اما رگبرگ‌ها به دلیل ساختار آوندی، منیزیم بیشتری حفظ می‌کنند. فتوسنتز کاهش یافته، تولید قند مختل می‌شود. گیاه ظاهر 'درخت کریسمس' پیدا می‌کند (زردی بین رگبرگی)."
            },
            { // مرحله 3: شدید
                name: "🔴 مرحله ۳: کمبود شدید منیزیم (پیشرفته، بحرانی)",
                glossary: "همه قسمت‌های برگ درگیر: زردی و قهوه‌ای شدن بین رگبرگ‌ها، نکروز، ریزش برگ‌های پایینی.",
                symptoms: "زردی شدید بین رگبرگ‌ها همراه با لکه‌های قهوه‌ای نکروز. برگ‌های پایینی خشک و شکننده شده و می‌ریزند. حاشیه سبز ناپدید می‌شود. رشد کامل متوقف، میوه‌ها کوچک و بی‌کیفیت.",
                science: "⚠️ <strong>دلیل علمی:</strong> کمبود حاد منیزیم: کلروفیل تقریباً به طور کامل تجزیه شده، فتوسنتز متوقف می‌شود. بافت‌های بین رگبرگ می‌میرند (نکروز). گیاه توانایی تولید انرژی را از دست می‌دهد و برگ‌های پایینی را می‌ریزد تا منابع را برای بقا حفظ کند."
            }
        ];
        
        // تابع به‌روزرسانی پنل متن و ظاهر برگ
        function goToStage(stage) {
            currentStage = stage;
            let intensity = 0;
            if (stage === 0) intensity = 0;
            if (stage === 1) intensity = 0.35;
            if (stage === 2) intensity = 0.65;
            if (stage === 3) intensity = 0.95;
            
            setSeverityVisual(intensity);
            
            const data = stageDetails[stage];
            const infoDiv = document.getElementById('infoPanel');
            infoDiv.innerHTML = `
                <div class="stage-name">${data.name}</div>
                <div class="section">
                    <div class="section-title">📖 آموزش اجزای برگ و نقش منیزیم</div>
                    <div class="section-content">${data.glossary}</div>
                </div>
                <div class="section">
                    <div class="section-title">🔍 علائم ظاهری در این مرحله (کمبود منیزیم)</div>
                    <div class="section-content">${data.symptoms}</div>
                </div>
                <div class="section">
                    <div class="section-title">🧠 علت علمی (فیزیولوژی کمبود منیزیم)</div>
                    <div class="section-content">${data.science}</div>
                </div>
                <hr>
                <div class="section-content" style="font-size:0.7rem; color:#5c481f;">💡 با هر کلیک، شدت کمبود منیزیم افزایش می‌یابد. پس از مرحله شدید، دوباره به حالت سالم برمی‌گردد.</div>
            `;
        }
        
        // دکمه: چرخه بین مراحل 0 تا 3
        const btn = document.getElementById('stageBtn');
        btn.addEventListener('click', () => {
            let next = currentStage + 1;
            if (next > 3) next = 0;
            goToStage(next);
        });
        
        // مقدار اولیه: سالم (مرحله 0)
        goToStage(0);
    })();
</script>
</body>
</html>
