<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>کرم میوه گوجه فرنگی (Helicoverpa) | آفت خطرناک</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1b3d2a, #0d2a1a);
            font-family: 'Segoe UI', 'Vazirmatn', Tahoma, system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .master {
            max-width: 750px;
            width: 100%;
            background: #27261cd9;
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 12px;
            box-shadow: 0 12px 28px black;
        }
        .card {
            background: #fef8ec;
            border-radius: 1.8rem;
            padding: 1rem;
            box-shadow: inset 0 0 0 1px #fff9e8, 0 6px 14px rgba(0,0,0,0.2);
        }
        .title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: #9b4b2c;
            text-shadow: 1px 1px 0 #e2d5c0;
        }
        .sub {
            text-align: center;
            font-size: 0.75rem;
            color: #b47c44;
            border-bottom: 2px dashed #dabd88;
            display: inline-block;
            width: auto;
            margin: 0 auto 12px auto;
            padding-bottom: 4px;
        }
        .svg-container {
            background: #e7ddc4;
            border-radius: 1.2rem;
            padding: 8px;
            text-align: center;
            margin: 8px 0;
            box-shadow: inset 0 0 0 2px #fef5e2, 0 4px 10px rgba(0,0,0,0.15);
            min-height: 620px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        svg {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 1rem;
        }
        .button-area {
            display: flex;
            justify-content: center;
            margin: 12px 0;
        }
        button {
            background: #c08545;
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 2rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        button:active { transform: scale(0.96); }
        .info-panel {
            background: #efe4cf;
            border-radius: 1.2rem;
            padding: 0.9rem;
            margin-top: 12px;
            border-right: 5px solid #aa7942;
            text-align: right;
            font-size: 0.75rem;
            max-height: 55vh;
            overflow-y: auto;
        }
        .stage-name {
            font-size: 1rem;
            font-weight: bold;
            color: #4a3920;
            background: #fdf1df;
            padding: 4px 10px;
            border-radius: 2rem;
            display: inline-block;
            margin-bottom: 8px;
        }
        .section {
            margin-top: 10px;
            background: #faf3e3;
            padding: 8px;
            border-radius: 1rem;
        }
        .section-title {
            font-weight: bold;
            color: #6b3f1c;
            border-right: 3px solid #c6904b;
            padding-right: 8px;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }
        .section-content { line-height: 1.45; color: #2c2a1a; }
        hr { margin: 8px 0; border-color: #dbbc87; }
        .highlight { background: #f5e6c4; padding: 2px 6px; border-radius: 12px; font-weight: bold; }
        footer {
            text-align: center;
            font-size: 0.6rem;
            color: #aa956b;
            margin-top: 10px;
        }
        @media (max-width: 500px) {
            .master { padding: 8px; }
            .card { padding: 0.7rem; }
            .title { font-size: 1.2rem; }
            .info-panel { font-size: 0.7rem; max-height: 50vh; }
            .section-title { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="master">

<script>
    (function() {
        const leafGrad = document.getElementById('leafGrad');
        const chewedLeaves = document.getElementById('chewedLeaves');
        const frass = document.getElementById('frass');
        const larva1 = document.getElementById('larva1');
        const larva2 = document.getElementById('larva2');
        const eggs = document.getElementById('eggs');
        const fruitHole = document.getElementById('fruitHole');
        const larvaInFruit = document.getElementById('larvaInFruit');
        const rottenFruit = document.getElementById('rottenFruit');
        const midVein = document.getElementById('midVein');
        const veinsGroup = document.getElementById('veinsGroup');
        const trichomesGroup = document.getElementById('trichomesGroup');
        
        let currentStage = 0;
        
        function setSeverityVisual(severity) {
            const hue = 85 - severity * 12;
            const sat = 55 - severity * 10;
            const light = 42 - severity * 8;
            const stops = leafGrad.querySelectorAll('stop');
            if (stops.length >= 3) {
                stops[0].setAttribute('stop-color', `hsl(${hue}, ${sat}%, ${light+5}%)`);
                stops[1].setAttribute('stop-color', `hsl(${hue-4}, ${sat-4}%, ${light-2}%)`);
                stops[2].setAttribute('stop-color', `hsl(${hue-8}, ${sat-8}%, ${light-6}%)`);
            }
            
            let chewOp = severity * 0.7;
            chewedLeaves.setAttribute('opacity', Math.min(0.7, chewOp).toString());
            
            let frassOp = severity * 0.8;
            frass.setAttribute('opacity', Math.min(0.8, frassOp).toString());
            
            let larva1Op = (severity > 0.25) ? (severity - 0.25) * 1.2 : 0;
            larva1.setAttribute('opacity', Math.min(1, larva1Op).toString());
            let larva2Op = (severity > 0.45) ? (severity - 0.45) * 1.5 : 0;
            larva2.setAttribute('opacity', Math.min(1, larva2Op).toString());
            
            let eggsOp = (severity > 0.3) ? (severity - 0.3) * 1.0 : 0;
            eggs.setAttribute('opacity', Math.min(0.7, eggsOp).toString());
            
            let holeOp = (severity > 0.4) ? (severity - 0.4) * 1.2 : 0;
            fruitHole.setAttribute('opacity', Math.min(1, holeOp).toString());
            
            let larvaInFruitOp = (severity > 0.55) ? (severity - 0.55) * 1.5 : 0;
            larvaInFruit.setAttribute('opacity', Math.min(1, larvaInFruitOp).toString());
            
            let rottenOp = (severity > 0.7) ? (severity - 0.7) * 2.0 : 0;
            rottenFruit.setAttribute('opacity', Math.min(0.9, rottenOp).toString());
            
            const veinColor = (severity > 0.6) ? "#8a9a5a" : "#5b953c";
            midVein.setAttribute('stroke', veinColor);
            const allVeins = veinsGroup.querySelectorAll('path');
            allVeins.forEach(p => p.setAttribute('stroke', (severity > 0.6) ? "#8a9a5a" : "#4b8231"));
            trichomesGroup.setAttribute('stroke', severity > 0.5 ? "#a88f58" : "#b6a467");
        }
        
        const stageDetails = [
            {
                name: "🌿 مرحله ۰: گیاه کاملاً سالم",
                symptoms: "🔹 برگ: سبز یکدست، بدون سوراخ<br>🍅 میوه: قرمز یکدست، بدون لکه",
                science: "شرایط مساعد برای کرم میوه:<br>• دمای ۲۵-۳۰ درجه<br>• رطوبت نسبی ۵۰-۷۰٪<br>• وجود علف‌های هرز میزبان<br>• کشت پشت سر هم گوجه",
                control: "🛡️ پیشگیری:<br>• شخم عمیق (از بین بردن شفیره‌ها)<br>• تله فرمونی<br>• تله نوری<br>• تناوب زراعی"
            },
            {
                name: "⚠️ مرحله ۱: آلودگی خفیف",
                symptoms: "🐛 برگ: لاروهای کوچک روی برگ، سوراخ‌های ریز، فضولات سبز/قهوه‌ای<br>🍅 میوه: بدون علائم",
                science: "پروانه کرم میوه تخم‌های خود را روی برگ می‌گذارد. لاروهای جوان از برگ تغذیه می‌کنند.",
                control: "💊 کنترل اولیه:<br>• باسیلوس تورنجینسیس (BT) ۱ کیلو<br>• ایندوکساکارب ۳۰۰ گرم<br>• حذف برگ‌های آلوده"
            },
            {
                name: "🐛 مرحله ۲: آلودگی متوسط",
                symptoms: "🐛 برگ: لاروهای بزرگ روی برگ، سوراخ‌های بزرگ، فضولات زیاد<br>🍅 میوه: سوراخ ورود کرم روی میوه، فضولات دور سوراخ",
                science: "لاروها پس از تغذیه از برگ به میوه حمله می‌کنند. یک کرم می‌تواند چندین میوه را آلوده کند.",
                control: "💊 کنترل شیمیایی:<br>• ایندوکساکارب ۳۰۰ گرم<br>• اسپینوساد ۲۰۰ میلی‌لیتر<br>• کلرانترانیلیپرول ۲۰۰ میلی‌لیتر<br>(تکرار هر ۷-۱۰ روز)"
            },
            {
                name: "🔴 مرحله ۳: آلودگی شدید",
                symptoms: "🔴 برگ: خسارت شدید، لاروهای بزرگ، حفره‌های زیاد<br>🍅 میوه: میوه پوسیده و لهیده، کرم داخل میوه، میوه کاملاً غیرقابل مصرف",
                science: "کاهش محصول ۵۰-۸۰٪. یک جفت کرم می‌تواند کل محصول یک بوته را نابود کند.",
                control: "🌱 مدیریت اضطراری:<br>• سمپاشی فوری (ایندوکساکارب + اسپینوساد)<br>• برداشت میوه‌های سالم<br>• حذف میوه‌های آلوده<br>• شخم عمیق بعد از برداشت"
            }
        ];
        
        function goToStage(stage) {
            currentStage = stage;
            let intensity = 0;
            if (stage === 0) intensity = 0;
            if (stage === 1) intensity = 0.35;
            if (stage === 2) intensity = 0.65;
            if (stage === 3) intensity = 0.95;
            
            setSeverityVisual(intensity);
            
            const data = stageDetails[stage];
            const infoDiv = document.getElementById('infoPanel');
            infoDiv.innerHTML = `
                <div class="stage-name">${data.name}</div>
                <div class="section">
                    <div class="section-title">🍃 علائم روی برگ و میوه</div>
                    <div class="section-content">${data.symptoms}</div>
                </div>
                <div class="section">
                    <div class="section-title">🐛 شکل ظاهری و زیستگاه کرم میوه</div>
                    <div class="section-content">کرم میوه لارو پروانه‌ای به طول ۳۰-۴۰ میلی‌متر، به رنگ سبز مایل به قهوه‌ای با نوارهای طولی تیره است. لاروها ابتدا از <strong>برگ‌های جوان</strong> تغذیه می‌کنند و سپس به <strong>میوه</strong> حمله می‌کنند. سوراخ ورود معمولاً در محل اتصال میوه به ساقه یا کناره میوه است.</div>
                </div>
                <div class="section">
                    <div class="section-title">💊 روش‌های کنترل و درمان</div>
                    <div class="section-content">${data.control}</div>
                </div>
                <hr>
                <div class="section-content highlight">🎯 سوراخ روی میوه + فضولات سیاه + کرم داخل میوه = کرم میوه</div>
            `;
        }
        
        const btn = document.getElementById('stageBtn');
        btn.addEventListener('click', () => {
            let next = currentStage + 1;
            if (next > 3) next = 0;
            goToStage(next);
        });
        
        goToStage(0);
    })();
</script>
</body>
</html>
