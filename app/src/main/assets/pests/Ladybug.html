<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>کفشدوزک (Ladybug) | حشره مفید گوجه فرنگی</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1b3d2a, #0d2a1a);
            font-family: 'Segoe UI', 'Vazirmatn', Tahoma, system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .master {
            max-width: 750px;
            width: 100%;
            background: #27261cd9;
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 12px;
            box-shadow: 0 12px 28px black;
        }
        .card {
            background: #fef8ec;
            border-radius: 1.8rem;
            padding: 1rem;
            box-shadow: inset 0 0 0 1px #fff9e8, 0 6px 14px rgba(0,0,0,0.2);
        }
        .title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: #9b4b2c;
            text-shadow: 1px 1px 0 #e2d5c0;
        }
        .sub {
            text-align: center;
            font-size: 0.75rem;
            color: #b47c44;
            border-bottom: 2px dashed #dabd88;
            display: inline-block;
            width: auto;
            margin: 0 auto 12px auto;
            padding-bottom: 4px;
        }
        .good-badge {
            background: #2c5a2a;
            color: #ffecb3;
            border-radius: 1rem;
            padding: 8px;
            margin-bottom: 12px;
            text-align: center;
            font-size: 0.75rem;
        }
        .svg-container {
            background: #e7ddc4;
            border-radius: 1.2rem;
            padding: 8px;
            text-align: center;
            margin: 8px 0;
            box-shadow: inset 0 0 0 2px #fef5e2, 0 4px 10px rgba(0,0,0,0.15);
            min-height: 620px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        svg {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 1rem;
        }
        .button-area {
            display: flex;
            justify-content: center;
            margin: 12px 0;
        }
        button {
            background: #c08545;
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 2rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        button:active { transform: scale(0.96); }
        .info-panel {
            background: #efe4cf;
            border-radius: 1.2rem;
            padding: 0.9rem;
            margin-top: 12px;
            border-right: 5px solid #aa7942;
            text-align: right;
            font-size: 0.75rem;
            max-height: 55vh;
            overflow-y: auto;
        }
        .stage-name {
            font-size: 1rem;
            font-weight: bold;
            color: #4a3920;
            background: #fdf1df;
            padding: 4px 10px;
            border-radius: 2rem;
            display: inline-block;
            margin-bottom: 8px;
        }
        .section {
            margin-top: 10px;
            background: #faf3e3;
            padding: 8px;
            border-radius: 1rem;
        }
        .section-title {
            font-weight: bold;
            color: #6b3f1c;
            border-right: 3px solid #c6904b;
            padding-right: 8px;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }
        .section-content { line-height: 1.45; color: #2c2a1a; }
        hr { margin: 8px 0; border-color: #dbbc87; }
        .highlight { background: #f5e6c4; padding: 2px 6px; border-radius: 12px; font-weight: bold; }
        footer {
            text-align: center;
            font-size: 0.6rem;
            color: #aa956b;
            margin-top: 10px;
        }
        @media (max-width: 500px) {
            .master { padding: 8px; }
            .card { padding: 0.7rem; }
            .title { font-size: 1.2rem; }
            .info-panel { font-size: 0.7rem; max-height: 50vh; }
            .section-title { font-size: 0.75rem; }
        }
    </style>
</head>

<script>
    (function() {
        const leafGrad = document.getElementById('leafGrad');
        const aphidPrey = document.getElementById('aphidPrey');
        const ladybugAdult = document.getElementById('ladybugAdult');
        const ladybugAdult2 = document.getElementById('ladybugAdult2');
        const ladybugLarva = document.getElementById('ladybugLarva');
        const ladybugEggs = document.getElementById('ladybugEggs');
        const midVein = document.getElementById('midVein');
        const veinsGroup = document.getElementById('veinsGroup');
        const trichomesGroup = document.getElementById('trichomesGroup');
        
        let currentStage = 0;
        
        function setSeverityVisual(severity) {
            // برگ سالم می‌ماند (کفشدوزک به برگ آسیب نمی‌زند)
            const hue = 85 - severity * 5;
            const sat = 55 - severity * 3;
            const light = 42 - severity * 2;
            const stops = leafGrad.querySelectorAll('stop');
            if (stops.length >= 3) {
                stops[0].setAttribute('stop-color', `hsl(${hue}, ${sat}%, ${light+5}%)`);
                stops[1].setAttribute('stop-color', `hsl(${hue-2}, ${sat-2}%, ${light-1}%)`);
                stops[2].setAttribute('stop-color', `hsl(${hue-4}, ${sat-4}%, ${light-4}%)`);
            }
            
            // شته (طعمه) - در مراحل بالاتر کفشدوزک، شته کمتر می‌شود
            let aphidOp = (1 - severity) * 0.8;
            aphidPrey.setAttribute('opacity', Math.min(0.8, Math.max(0, aphidOp)).toString());
            
            // کفشدوزک بالغ
            let adultOp = severity * 0.9;
            ladybugAdult.setAttribute('opacity', Math.min(1, adultOp).toString());
            let adult2Op = (severity > 0.3) ? (severity - 0.3) * 1.2 : 0;
            ladybugAdult2.setAttribute('opacity', Math.min(1, adult2Op).toString());
            
            // لارو کفشدوزک
            let larvaOp = (severity > 0.5) ? (severity - 0.5) * 1.5 : 0;
            ladybugLarva.setAttribute('opacity', Math.min(1, larvaOp).toString());
            
            // تخم کفشدوزک
            let eggsOp = (severity > 0.2) ? (severity - 0.2) * 0.8 : 0;
            ladybugEggs.setAttribute('opacity', Math.min(0.8, eggsOp).toString());
            
            const veinColor = (severity > 0.6) ? "#8a9a5a" : "#5b953c";
            midVein.setAttribute('stroke', veinColor);
            const allVeins = veinsGroup.querySelectorAll('path');
            allVeins.forEach(p => p.setAttribute('stroke', (severity > 0.6) ? "#8a9a5a" : "#4b8231"));
            trichomesGroup.setAttribute('stroke', severity > 0.5 ? "#a88f58" : "#b6a467");
        }
        
        const stageDetails = [
            {
                name: "🌿 مرحله ۰: بدون کفشدوزک",
                symptoms: "🔹 برگ: سالم و سبز<br>🐞 کفشدوزک: وجود ندارد<br>🍅 میوه: سالم",
                science: "کفشدوزک حشره‌ای مفید است که از شته‌ها، کنه‌ها و سایر آفات نرم‌تن تغذیه می‌کند. یک کفشدوزک بالغ می‌تواند روزانه ۵۰-۶۰ شته را بخورد.",
                control: "🌱 <strong>نکات جذب کفشدوزک:</strong><br>• کاشت گیاهان جاذب (شوید، گشنیز، گل آفتابگردان)<br>• عدم استفاده از سموم شیمیایی وسیع‌الطیف<br>• ایجاد پناهگاه (بقایای گیاهی)"
            },
            {
                name: "🐞 مرحله ۱: حضور کفشدوزک (آغاز کنترل بیولوژیک)",
                symptoms: "🔹 برگ: سالم<br>🐞 کفشدوزک: چند کفشدوزک بالغ روی برگ<br>🍅 میوه: سالم",
                science: "کفشدوزک‌ها به طور طبیعی به دنبال شته‌ها وارد مزرعه می‌شوند. وجود آنها نشانه تعادل اکولوژیک است.",
                control: "✅ <strong>توصیه:</strong> از سمپاشی خودداری کنید. کفشدوزک‌ها به کنترل شته‌ها کمک می‌کنند."
            },
            {
                name: "🥚 مرحله ۲: تخم‌گذاری و لارو",
                symptoms: "🔹 برگ: سالم<br>🐞 کفشدوزک: تخم، لارو و حشرات بالغ<br>🦟 شته: در حال کاهش<br>🍅 میوه: سالم",
                science: "لارو کفشدوزک بسیار فعال است و روزانه ۸۰-۱۰۰ شته می‌خورد. تخم‌ها به صورت دسته‌ای نزدیک کلونی شته گذاشته می‌شوند.",
                control: "✅ <strong>نکته:</strong> لاروهای کفشدوزک شبیه کرم‌های کوچک سیاه با لکه‌های نارنجی هستند. آنها را با آفت اشتباه نگیرید."
            },
            {
                name: "✅ مرحله ۳: کنترل کامل آفت",
                symptoms: "🔹 برگ: سالم و عاری از شته<br>🐞 کفشدوزک: جمعیت فعال<br>🍅 میوه: سالم و با کیفیت",
                science: "کفشدوزک‌ها جمعیت شته را به زیر سطح اقتصادی رسانده‌اند. گیاه بدون نیاز به سمپاشی سالم مانده است.",
                control: "🎯 <strong>نتیجه:</strong> کنترل بیولوژیک موفق. در صورت نبود شته، کفشدوزک‌ها به مزارع دیگر مهاجرت می‌کنند."
            }
        ];
        
        function goToStage(stage) {
            currentStage = stage;
            let intensity = 0;
            if (stage === 0) intensity = 0;
            if (stage === 1) intensity = 0.35;
            if (stage === 2) intensity = 0.65;
            if (stage === 3) intensity = 0.95;
            
            setSeverityVisual(intensity);
            
            const data = stageDetails[stage];
            const infoDiv = document.getElementById('infoPanel');
            infoDiv.innerHTML = `
                <div class="stage-name">${data.name}</div>
                <div class="section">
                    <div class="section-title">🍃 وضعیت برگ و میوه</div>
                    <div class="section-content">${data.symptoms}</div>
                </div>
                <div class="section">
                    <div class="section-title">🐞 کفشدوزک و نقش آن در مزرعه</div>
                    <div class="section-content">${data.science}</div>
                </div>
                <div class="section">
                    <div class="section-title">✅ توصیه‌های مدیریتی</div>
                    <div class="section-content">${data.control}</div>
                </div>
                <hr>
                <div class="section-content highlight">🐞 کفشدوزک = دوست مزرعه! از سمپاشی علیه آن خودداری کنید.</div>
            `;
        }
        
        const btn = document.getElementById('stageBtn');
        btn.addEventListener('click', () => {
            let next = currentStage + 1;
            if (next > 3) next = 0;
            goToStage(next);
        });
        
        goToStage(0);
    })();
</script>
