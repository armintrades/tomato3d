<script>
    (function() {
        const leafGrad = document.getElementById('leafGrad');
        const generalChlorosis = document.getElementById('generalChlorosis');
        const wilting = document.getElementById('wilting');
        const leafSizeReduction = document.getElementById('leafSizeReduction');
        const nematodeGalls = document.getElementById('nematodeGalls');
        const rootNecrosis = document.getElementById('rootNecrosis');
        const smallFruit = document.getElementById('smallFruit');
        const midVein = document.getElementById('midVein');
        const veinsGroup = document.getElementById('veinsGroup');
        const trichomesGroup = document.getElementById('trichomesGroup');
        const petiolePath = document.getElementById('petiolePath');
        const leafGroup = document.getElementById('leafGroup');
        
        let currentStage = 0;
        
        function setSeverityVisual(severity) {
            const hue = 85 - severity * 12;
            const sat = 55 - severity * 10;
            const light = 42 - severity * 8;
            const stops = leafGrad.querySelectorAll('stop');
            if (stops.length >= 3) {
                stops[0].setAttribute('stop-color', `hsl(${hue}, ${sat}%, ${light+5}%)`);
                stops[1].setAttribute('stop-color', `hsl(${hue-4}, ${sat-4}%, ${light-2}%)`);
                stops[2].setAttribute('stop-color', `hsl(${hue-8}, ${sat-8}%, ${light-6}%)`);
            }
            
            let chloroOp = severity * 0.8;
            generalChlorosis.setAttribute('opacity', Math.min(0.7, chloroOp).toString());
            
            let wiltOp = severity * 0.7;
            wilting.setAttribute('opacity', Math.min(0.65, wiltOp).toString());
            
            let scale = 1 - severity * 0.2;
            leafGroup.setAttribute('transform', `scale(${scale}) translate(${300*(1-scale)}, ${340*(1-scale)*0.5})`);
            
            let gallOp = severity * 0.85;
            nematodeGalls.setAttribute('opacity', Math.min(0.9, gallOp).toString());
            
            let rootNecroOp = (severity > 0.55) ? (severity - 0.55) * 1.5 : 0;
            rootNecrosis.setAttribute('opacity', Math.min(0.9, rootNecroOp).toString());
            
            let fruitOp = (severity > 0.5) ? (severity - 0.5) * 0.8 : 0;
            smallFruit.setAttribute('opacity', Math.min(0.6, fruitOp).toString());
            
            const veinColor = (severity > 0.6) ? "#8a9a5a" : "#5b953c";
            midVein.setAttribute('stroke', veinColor);
            const allVeins = veinsGroup.querySelectorAll('path');
            allVeins.forEach(p => p.setAttribute('stroke', (severity > 0.6) ? "#8a9a5a" : "#4b8231"));
            trichomesGroup.setAttribute('stroke', severity > 0.5 ? "#a88f58" : "#b6a467");
            
            if (severity > 0.6) {
                petiolePath.setAttribute('stroke', "#9a8050");
            } else {
                petiolePath.setAttribute('stroke', "url(#petioleGrad)");
            }
        }
        
        const stageDetails = [
            {
                name: "🌿 مرحله ۰: گیاه کاملاً سالم",

                science: "📗 شرایط مساعد برای نماتد:<br>• خاک شنی (تهویه بالا)<br>• دمای خاک ۲۵-۳۰ درجه<br>• رطوبت متوسط خاک<br>• کشت پشت سر هم گوجه<br>• خاک آلوده به نماتد",
                control: "🛡️ پیشگیری:<br>• تناوب زراعی ۳-۴ ساله با غلات (ذرت، گندم)<br>• استفاده از ارقام مقاوم (Mi gene)<br>• ضدعفونی خاک (آفتاب‌دهی<br>• کود سبز (ماریگولد - گل جعفری)"
            },
            {
                name: "⚠️ مرحله ۱: آلودگی خفیف",
                symptoms: "🟡 برگ: زردی خفیف، رشد کمی کندتر<br>🌿 ریشه: گره‌های ریز (۱-۲ میلی‌متر) روی ریشه<br>🍅 میوه: طبیعی",
                science: "🔬 لارو نماتد وارد ریشه شده و با تغذیه از سلول‌ها، باعث تشکیل گره می‌شود. جذب آب و مواد غذایی کاهش می‌یابد.",
                control: "💊 کنترل اولیه:<br>• نماتدکش‌ها (فنامیفوس، اُکسامیل)<br>• افزایش مواد آلی خاک<br>• آبیاری منظم (کاهش تنش)"
            },
            {
                name: "🟡 مرحله ۲: آلودگی متوسط",
                symptoms: "🟡 برگ: زردی واضح، پژمردگی در گرمای روز، کاهش رشد<br>🌿 ریشه: گره‌های متعدد (۲-۵ میلی‌متر) روی ریشه، توقف رشد ریشه<br>🍅 میوه: کوچک، کیفیت پایین",
                science: "🧪 نماتدها سیستم آوندی ریشه را تخریب کرده و جذب آب و مواد را به شدت کاهش می‌دهند. گیاه مستعد پژمردگی فوزاریومی می‌شود.",
                control: "💊 کنترل شیمیایی:<br>• آبامکتین (ورتیمک) ۱ لیتر/هکتار<br>• فنامیفوس (نماتور) ۱۰ لیتر/هکتار<br>• افزایش مقاومت با کودهای فسفر و پتاسیم"

                symptoms: "🔴 برگ: زردی کامل، پژمردگی دائمی، کوتولگی شدید، ریزش برگ<br>🌿 ریشه: گره‌های بزرگ (۵-۱۰ میلی‌متر)، پوسیدگی ریشه، گیاه به راحتی کنده می‌شود<br>🍅 میوه: تشکیل نمی‌شود یا بسیار ریز و بی‌کیفیت",
                science: "⚠️ کاهش محصول ۵۰-۸۰٪. نماتدها در خاک تا ۵ سال زنده می‌مانند. گیاه توانایی جذب آب و مواد را از دست می‌دهد.",
                control: "🌱 مدیریت اضطراری:<br>• حذف بوته‌های آلوده (خارج از مزرعه)<br>• تناوب طولانی (۴-۵ سال) با گیاهان غیرمیزبان<br>• ضدعفونی خاک (آفتاب‌دهی + بخار)<br>• کشت گیاهان تله (ماریگولد) در تابستان"
            }
        ];
        
        function goToStage(stage) {
            currentStage = stage;
            let intensity = 0;
            if (stage === 0) intensity = 0;
            if (stage === 1) intensity = 0.35;
            if (stage === 2) intensity = 0.65;
            if (stage === 3) intensity = 0.95;
            
            setSeverityVisual(intensity);
            
            const data = stageDetails[stage];
            const infoDiv = document.getElementById('infoPanel');
            infoDiv.innerHTML = `
                <div class="stage-name">${data.name}</div>
                <div class="section">
                    <div class="section-title">🍃 علائم روی برگ، ریشه و میوه</div>
                    <div class="section-content">${data.symptoms}</div>
                </div>
                <div class="section">
                    <div class="section-title">🧫 شرایط مساعد و چرخه بیماری</div>
                    <div class="section-content">${data.science}</div>
                </div>
                <div class="section">
                    <div class="section-title">💊 روش‌های کنترل و درمان</div>
                    <div class="section-content">${data.control}</div>
                </div>
                <hr>
                <div class="section-content highlight">🎯 <strong>تشخیص قطعی:</strong> ریشه را از خاک خارج کنید. اگر گره‌های متعدد (شبیه تسبیح) داشتید → نماتد ریشه</div>
                <div class="section-content" style="margin-top:8px; background:#fae6c3; padding:5px; border-radius:12px;">
                    🌱 <strong>کنترل زراعی مؤثر:</strong> کشت ماریگولد (گل جعفری) به عنوان گیاه تله، تعداد نماتد خاک را تا ۵۰٪ کاهش می‌دهد.
                </div>
            `;
        }
        
        const btn = document.getElementById('stageBtn');
        btn.addEventListener('click', () => {
            let next = currentStage + 1;
            if (next > 3) next = 0;
            goToStage(next);
        });
        
        goToStage(0);
    })();
</script>
</body>
</html>
