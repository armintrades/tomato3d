<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1b3d2a, #0d2a1a);
            font-family: 'Segoe UI', 'Vazirmatn', Tahoma, system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .master {
            max-width: 750px;
            width: 100%;
            background: #27261cd9;
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 12px;
            box-shadow: 0 12px 28px black;
        }
        .card {
            background: #fef8ec;
            border-radius: 1.8rem;
            padding: 1rem;
            box-shadow: inset 0 0 0 1px #fff9e8, 0 6px 14px rgba(0,0,0,0.2);
        }
        .title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: #9b4b2c;
            text-shadow: 1px 1px 0 #e2d5c0;
        }
        .sub {
            text-align: center;
            font-size: 0.75rem;
            color: #b47c44;
            border-bottom: 2px dashed #dabd88;
            display: inline-block;
            width: auto;
            margin: 0 auto 12px auto;
            padding-bottom: 4px;
        }
        .svg-container {
            background: #e7ddc4;
            border-radius: 1.2rem;
            padding: 8px;
            text-align: center;
            margin: 8px 0;
            box-shadow: inset 0 0 0 2px #fef5e2, 0 4px 10px rgba(0,0,0,0.15);
            min-height: 620px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        svg {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 1rem;
        }
        .button-area {
            display: flex;
            justify-content: center;
            margin: 12px 0;
        }
        button {
            background: #c08545;
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 2rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        button:active { transform: scale(0.96); }
        .info-panel {
            background: #efe4cf;
            border-radius: 1.2rem;
            padding: 0.9rem;
            margin-top: 12px;
            border-right: 5px solid #aa7942;
            text-align: right;
            font-size: 0.75rem;
            max-height: 55vh;
            overflow-y: auto;
        }
        .stage-name {
            font-size: 1rem;
            font-weight: bold;
            color: #4a3920;
            background: #fdf1df;
            padding: 4px 10px;
            border-radius: 2rem;
            display: inline-block;
            margin-bottom: 8px;
        }
        .section {
            margin-top: 10px;
            background: #faf3e3;
            padding: 8px;
            border-radius: 1rem;
        }
        .section-title {
            font-weight: bold;
            color: #6b3f1c;
            border-right: 3px solid #c6904b;
            padding-right: 8px;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }
        .section-content { line-height: 1.45; color: #2c2a1a; }
        hr { margin: 8px 0; border-color: #dbbc87; }
        .highlight { background: #f5e6c4; padding: 2px 6px; border-radius: 12px; font-weight: bold; }
        footer {
            text-align: center;
            font-size: 0.6rem;
            color: #aa956b;
            margin-top: 10px;
        }
        @media (max-width: 500px) {
            .master { padding: 8px; }
            .card { padding: 0.7rem; }
            .title { font-size: 1.2rem; }
            .info-panel { font-size: 0.7rem; max-height: 50vh; }
            .section-title { font-size: 0.75rem; }
        }
    </style>
</head>

<script>
    (function() {
        const leafGrad = document.getElementById('leafGrad');
        const yellowStippling = document.getElementById('yellowStippling');
        const leafBrowning = document.getElementById('leafBrowning');
        const spiderWeb = document.getElementById('spiderWeb');
        const thickWeb = document.getElementById('thickWeb');
        const leafNecrosis = document.getElementById('leafNecrosis');
        const miteAdult1 = document.getElementById('miteAdult1');
        const miteAdult2 = document.getElementById('miteAdult2');
        const miteAdult3 = document.getElementById('miteAdult3');
        const miteEggs = document.getElementById('miteEggs');
        const smallFruit = document.getElementById('smallFruit');
        const midVein = document.getElementById('midVein');
        const veinsGroup = document.getElementById('veinsGroup');
        const trichomesGroup = document.getElementById('trichomesGroup');
        
        let currentStage = 0;
        
        function setSeverityVisual(severity) {
            const hue = 85 - severity * 18;
            const sat = 55 - severity * 15;
            const light = 42 - severity * 12;
            const stops = leafGrad.querySelectorAll('stop');
            if (stops.length >= 3) {
                stops[0].setAttribute('stop-color', `hsl(${hue}, ${sat}%, ${light+5}%)`);
                stops[1].setAttribute('stop-color', `hsl(${hue-5}, ${sat-5}%, ${light-2}%)`);
                stops[2].setAttribute('stop-color', `hsl(${hue-10}, ${sat-10}%, ${light-6}%)`);
            }
            
            let stippleOp = severity * 0.85;
            yellowStippling.setAttribute('opacity', Math.min(0.8, stippleOp).toString());
            
            let browningOp = (severity > 0.3) ? (severity - 0.3) * 1.0 : 0;
            leafBrowning.setAttribute('opacity', Math.min(0.6, browningOp).toString());
            
            let webOp = severity * 0.7;
            spiderWeb.setAttribute('opacity', Math.min(0.7, webOp).toString());
            
            let thickOp = (severity > 0.5) ? (severity - 0.5) * 1.4 : 0;
            thickWeb.setAttribute('opacity', Math.min(0.8, thickOp).toString());
            
            let necroOp = (severity > 0.6) ? (severity - 0.6) * 0.8 : 0;
            leafNecrosis.setAttribute('opacity', Math.min(0.5, necroOp).toString());
            
            let mite1Op = (severity > 0.25) ? (severity - 0.25) * 1.2 : 0;
            miteAdult1.setAttribute('opacity', Math.min(1, mite1Op).toString());
            let mite2Op = (severity > 0.4) ? (severity - 0.4) * 1.3 : 0;
            miteAdult2.setAttribute('opacity', Math.min(1, mite2Op).toString());
            let mite3Op = (severity > 0.55) ? (severity - 0.55) * 1.5 : 0;
            miteAdult3.setAttribute('opacity', Math.min(1, mite3Op).toString());
            
            let eggsOp = (severity > 0.45) ? (severity - 0.45) * 1.2 : 0;
            miteEggs.setAttribute('opacity', Math.min(0.8, eggsOp).toString());
            
            let fruitOp = (severity > 0.5) ? (severity - 0.5) * 1.0 : 0;
            smallFruit.setAttribute('opacity', Math.min(0.7, fruitOp).toString());
            
            const veinColor = (severity > 0.6) ? "#8a9a5a" : "#5b953c";
            midVein.setAttribute('stroke', veinColor);
            const allVeins = veinsGroup.querySelectorAll('path');
            allVeins.forEach(p => p.setAttribute('stroke', (severity > 0.6) ? "#8a9a5a" : "#4b8231"));
            trichomesGroup.setAttribute('stroke', severity > 0.5 ? "#a88f58" : "#b6a467");
        }
        
        const stageDetails = [
            {
                name: "🌿 مرحله ۰: گیاه کاملاً سالم",
                symptoms: "🔹 برگ: سبز یکدست، بدون لکه<br>🍅 میوه: قرمز یکدست",
                science: "شرایط مساعد برای کنه عنکبوتی:<br>• دمای ۲۸-۳۵ درجه (گرم)<br>• رطوبت نسبی <50% (هوای خشک)<br>• تهویه ضعیف<br>• گرد و غبار روی برگ",
                control: "🛡️ پیشگیری:<br>• افزایش رطوبت (غبارپاشی صبحگاهی)<br>• حذف علف‌های هرز<br>• تناوب زراعی<br>• ارقام مقاوم"
            },
            {
                name: "⚠️ مرحله ۱: آلودگی خفیف",
                symptoms: "🟡 برگ: لکه‌های ریز زرد (نقطه‌نقطه) روی برگ، چند کنه پراکنده زیر برگ<br>🍅 میوه: بدون علائم",
                science: "کنه با مکیدن شیره سلولی، باعث ایجاد لکه‌های زرد ریز روی برگ می‌شود. در زیر برگ تارهای بسیار ریز دیده می‌شود.",
                control: "💊 کنترل اولیه:<br>• آبامکتین ۵۰۰ میلی‌لیتر/۱۰۰۰ لیتر<br>• افزایش رطوبت (غبارپاشی)<br>• حذف برگ‌های آلوده"
            },
            {
                name: "🕸️ مرحله ۲: آلودگی متوسط",
                symptoms: "🟡 برگ: زردی عمومی، تار عنکبوت قابل مشاهده زیر برگ، تعداد کنه زیاد<br>🍅 میوه: کوچک شدن میوه، آفتاب سوختگی",
                science: "تار عنکبوت از انتشار کنه به برگ‌های دیگر کمک می‌کند. فتوسنتز کاهش می‌یابد و برگ خشک می‌شود.",
                control: "💊 کنترل شیمیایی:<br>• آبامکتین ۵۰۰ میلی‌لیتر<br>• پروپارژیت ۱ لیتر<br>• اسپیرومسیفن ۰.۵ لیتر<br>(تکرار هر ۷-۱۰ روز)"
            },
            {
                name: "🔴 مرحله ۳: آلودگی شدید",
                symptoms: "🔴 برگ: زردی شدید، نکروز، خشکی و ریزش برگ، تار عنکبوت غلیظ، جمعیت انبوه کنه<br>🍅 میوه: میوه ریز، آفتاب سوخته، بی‌کیفیت",
                science: "کاهش محصول ۵۰-۷۰٪. برگ‌ها توانایی فتوسنتز را از دست می‌دهند و گیاه می‌میرد.",
                control: "🌱 مدیریت اضطراری:<br>• سمپاشی فوری (آبامکتین + پروپارژیت)<br>• برداشت میوه‌های سالم<br>• حذف بوته‌های شدیداً آلوده"
            }
        ];
        
        function goToStage(stage) {
            currentStage = stage;
            let intensity = 0;
            if (stage === 0) intensity = 0;
            if (stage === 1) intensity = 0.35;
            if (stage === 2) intensity = 0.65;
            if (stage === 3) intensity = 0.95;
            
            setSeverityVisual(intensity);
            
            const data = stageDetails[stage];
            const infoDiv = document.getElementById('infoPanel');
            infoDiv.innerHTML = `
                <div class="stage-name">${data.name}</div>
                <div class="section">
                    <div class="section-title">🍃 علائم روی برگ و میوه</div>
                    <div class="section-content">${data.symptoms}</div>
                </div>
                <div class="section">
                    <div class="section-title">🕷️ شکل ظاهری و زیستگاه کنه عنکبوتی</div>
                    <div class="section-content">کنه عنکبوتی حشره‌ای بسیار ریز (۰.۳-۰.۵ میلی‌متر) است که با چشم غیرمسلح به صورت نقاط ریز قرمز/قهوه‌ای دیده می‌شود. معمولاً در <strong>زیر برگ</strong> و بین <strong>تارهای عنکبوت ریز</strong> زندگی می‌کند. در هوای گرم و خشک جمعیت آن به سرعت افزایش می‌یابد.</div>
                </div>
                <div class="section">
                    <div class="section-title">💊 روش‌های کنترل و درمان</div>
                    <div class="section-content">${data.control}</div>
                </div>
                <hr>
                <div class="section-content highlight">🎯 لکه‌های ریز زرد روی برگ + تار عنکبوت ریز زیر برگ = کنه عنکبوتی</div>
            `;
        }
        
        const btn = document.getElementById('stageBtn');
        btn.addEventListener('click', () => {
            let next = currentStage + 1;
            if (next > 3) next = 0;
            goToStage(next);
        });
        
        goToStage(0);
    })();
</script>
</body>
