<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تریپس (Thrips) | آفت خطرناک گوجه فرنگی</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1b3d2a, #0d2a1a);
            font-family: 'Segoe UI', 'Vazirmatn', Tahoma, system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .master {
            max-width: 750px;
            width: 100%;
            background: #27261cd9;
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 12px;
            box-shadow: 0 12px 28px black;
        }
        .card {
            background: #fef8ec;
            border-radius: 1.8rem;
            padding: 1rem;
            box-shadow: inset 0 0 0 1px #fff9e8, 0 6px 14px rgba(0,0,0,0.2);
        }
        .title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: #9b4b2c;
            text-shadow: 1px 1px 0 #e2d5c0;
        }
        .sub {
            text-align: center;
            font-size: 0.75rem;
            color: #b47c44;
            border-bottom: 2px dashed #dabd88;
            display: inline-block;
            width: auto;
            margin: 0 auto 12px auto;
            padding-bottom: 4px;
        }
        .svg-container {
            background: #e7ddc4;
            border-radius: 1.2rem;
            padding: 8px;
            text-align: center;
            margin: 8px 0;
            box-shadow: inset 0 0 0 2px #fef5e2, 0 4px 10px rgba(0,0,0,0.15);
            min-height: 620px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        svg {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 1rem;
        }
        .button-area {
            display: flex;
            justify-content: center;
            margin: 12px 0;
        }
        button {
            background: #c08545;
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 2rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        button:active { transform: scale(0.96); }
        .info-panel {
            background: #efe4cf;
            border-radius: 1.2rem;
            padding: 0.9rem;
            margin-top: 12px;
            border-right: 5px solid #aa7942;
            text-align: right;
            font-size: 0.75rem;
            max-height: 55vh;
            overflow-y: auto;
        }
        .stage-name {
            font-size: 1rem;
            font-weight: bold;
            color: #4a3920;
            background: #fdf1df;
            padding: 4px 10px;
            border-radius: 2rem;
            display: inline-block;
            margin-bottom: 8px;
        }
        .section {
            margin-top: 10px;
            background: #faf3e3;
            padding: 8px;
            border-radius: 1rem;
        }
        .section-title {
            font-weight: bold;
            color: #6b3f1c;
            border-right: 3px solid #c6904b;
            padding-right: 8px;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }
        .section-content { line-height: 1.45; color: #2c2a1a; }
        hr { margin: 8px 0; border-color: #dbbc87; }
        .highlight { background: #f5e6c4; padding: 2px 6px; border-radius: 12px; font-weight: bold; }
        footer {
            text-align: center;
            font-size: 0.6rem;
            color: #aa956b;
            margin-top: 10px;
        }
        @media (max-width: 500px) {
            .master { padding: 8px; }
            .card { padding: 0.7rem; }
            .title { font-size: 1.2rem; }
            .info-panel { font-size: 0.7rem; max-height: 50vh; }
            .section-title { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<script>
    (function() {
        const leafGrad = document.getElementById('leafGrad');
        const silveryStippling = document.getElementById('silveryStippling');
        const leafYellowing = document.getElementById('leafYellowing');
        const leafDeformation = document.getElementById('leafDeformation');
        const marginNecrosis = document.getElementById('marginNecrosis');
        const thripsAdult1 = document.getElementById('thripsAdult1');
        const thripsAdult2 = document.getElementById('thripsAdult2');
        const thripsNymph = document.getElementById('thripsNymph');
        const thripsEggs = document.getElementById('thripsEggs');
        const frass = document.getElementById('frass');
        const fruitSilvery = document.getElementById('fruitSilvery');
        const deformedFruit = document.getElementById('deformedFruit');
        const midVein = document.getElementById('midVein');
        const veinsGroup = document.getElementById('veinsGroup');
        const trichomesGroup = document.getElementById('trichomesGroup');
        
        let currentStage = 0;
        
        function setSeverityVisual(severity) {
            const hue = 85 - severity * 12;
            const sat = 55 - severity * 10;
            const light = 42 - severity * 8;
            const stops = leafGrad.querySelectorAll('stop');
            if (stops.length >= 3) {
                stops[0].setAttribute('stop-color', `hsl(${hue}, ${sat}%, ${light+5}%)`);
                stops[1].setAttribute('stop-color', `hsl(${hue-4}, ${sat-4}%, ${light-2}%)`);
                stops[2].setAttribute('stop-color', `hsl(${hue-8}, ${sat-8}%, ${light-6}%)`);
            }
            
            let silverOp = severity * 0.85;
            silveryStippling.setAttribute('opacity', Math.min(0.8, silverOp).toString());
            
            let yellowOp = severity * 0.7;
            leafYellowing.setAttribute('opacity', Math.min(0.6, yellowOp).toString());
            
            let deformOp = (severity > 0.3) ? (severity - 0.3) * 1.0 : 0;
            leafDeformation.setAttribute('opacity', Math.min(0.6, deformOp).toString());
            
            let necroOp = (severity > 0.6) ? (severity - 0.6) * 0.7 : 0;
            marginNecrosis.setAttribute('opacity', Math.min(0.4, necroOp).toString());
            
            let t1Op = (severity > 0.2) ? (severity - 0.2) * 1.2 : 0;
            thripsAdult1.setAttribute('opacity', Math.min(1, t1Op).toString());
            let t2Op = (severity > 0.4) ? (severity - 0.4) * 1.3 : 0;
            thripsAdult2.setAttribute('opacity', Math.min(1, t2Op).toString());
            let tNOp = (severity > 0.35) ? (severity - 0.35) * 1.2 : 0;
            thripsNymph.setAttribute('opacity', Math.min(1, tNOp).toString());
            
            let eggsOp = (severity > 0.3) ? (severity - 0.3) * 0.8 : 0;
            thripsEggs.setAttribute('opacity', Math.min(0.7, eggsOp).toString());
            
            let frassOp = (severity > 0.4) ? (severity - 0.4) * 0.8 : 0;
            frass.setAttribute('opacity', Math.min(0.6, frassOp).toString());
            
            let fruitSilOp = severity * 0.6;
            fruitSilvery.setAttribute('opacity', Math.min(0.5, fruitSilOp).toString());
            
            let fruitDefOp = (severity > 0.55) ? (severity - 0.55) * 1.2 : 0;
            deformedFruit.setAttribute('opacity', Math.min(0.7, fruitDefOp).toString());
            
            const veinColor = (severity > 0.6) ? "#8a9a5a" : "#5b953c";
            midVein.setAttribute('stroke', veinColor);
            const allVeins = veinsGroup.querySelectorAll('path');
            allVeins.forEach(p => p.setAttribute('stroke', (severity > 0.6) ? "#8a9a5a" : "#4b8231"));
            trichomesGroup.setAttribute('stroke', severity > 0.5 ? "#a88f58" : "#b6a467");
        }
        
        const stageDetails = [
            {
                name: "🌿 مرحله ۰: گیاه کاملاً سالم",
                symptoms: "🔹 برگ: سبز یکدست، بدون لکه<br>🍅 میوه: قرمز یکدست",
                science: "شرایط مساعد برای تریپس:<br>• دمای ۲۵-۳۰ درجه<br>• رطوبت نسبی ۴۰-۶۰٪ (هوای گرم و خشک)<br>• تهویه ضعیف<br>• وجود علف‌های هرز میزبان",
                control: "🛡️ پیشگیری:<br>• تله چسبنده آبی و زرد<br>• توری توری (گلخانه)<br>• حذف علف‌های هرز<br>• افزایش رطوبت (غبارپاشی)"
            },
            {
                name: "⚠️ مرحله ۱: آلودگی خفیف",
                symptoms: "🦟 برگ: لکه‌های نقره‌ای ریز روی برگ، چند تریپس پراکنده<br>🍅 میوه: بدون علائم",
                science: "تریپس با مکیدن شیره سلولی، باعث ایجاد لکه‌های نقره‌ای روی برگ می‌شود. حشرات بسیار ریز هستند و با چشم غیرمسلح به سختی دیده می‌شوند.",
                control: "💊 کنترل اولیه:<br>• اسپینوساد ۲۰۰ میلی‌لیتر/۱۰۰۰ لیتر<br>• تله چسبنده آبی<br>• حذف برگ‌های آلوده"
            },
            {
                name: "🦟 مرحله ۲: آلودگی متوسط",
                symptoms: "🦟 برگ: لکه‌های نقره‌ای گسترده، زردی، پیچیدگی خفیف برگ، جمعیت تریپس زیاد<br>🍅 میوه: لکه‌های نقره‌ای روی میوه، کیفیت پایین",
                science: "تریپس ناقل ویروس‌های خطرناک (مانند TSWV) است. خسارت مستقیم و غیرمستقیم بالاست.",
                control: "💊 کنترل شیمیایی:<br>• اسپینوساد ۲۰۰ میلی‌لیتر<br>• ایمیداکلوپرید ۵۰۰ میلی‌لیتر<br>• استامی پراید ۲۰۰ گرم<br>(تکرار هر ۷-۱۰ روز)"
            },
            {
                name: "🔴 مرحله ۳: آلودگی شدید",
                symptoms: "🔴 برگ: لکه‌های نقره‌ای گسترده، زردی شدید، پیچیدگی و بدشکلی، ریزش برگ<br>🍅 میوه: میوه بدشکل، لکه‌دار، بی‌کیفیت، غیرقابل فروش",
                science: "کاهش محصول ۵۰-۷۰٪. تریپس ویروس‌ها را منتقل کرده و گیاه را نابود می‌کند.",
                control: "🌱 مدیریت اضطراری:<br>• سمپاشی فوری (اسپینوساد + ایمیداکلوپرید)<br>• برداشت میوه‌های سالم<br>• حذف بوته‌های شدیداً آلوده"
            }
        ];
        
        function goToStage(stage) {
            currentStage = stage;
            let intensity = 0;
            if (stage === 0) intensity = 0;
            if (stage === 1) intensity = 0.35;
            if (stage === 2) intensity = 0.65;
            if (stage === 3) intensity = 0.95;
            
            setSeverityVisual(intensity);
            
            const data = stageDetails[stage];
            const infoDiv = document.getElementById('infoPanel');
            infoDiv.innerHTML = `
                <div class="stage-name">${data.name}</div>
                <div class="section">
                    <div class="section-title">🍃 علائم روی برگ و میوه</div>
                    <div class="section-content">${data.symptoms}</div>
                </div>
                <div class="section">
                    <div class="section-title">🦟 شکل ظاهری و زیستگاه تریپس</div>
                    <div class="section-content">تریپس حشره‌ای بسیار ریز (۰.۵-۲ میلی‌متر) با بدن باریک و کشیده، به رنگ زرد مایل به قهوه‌ای است. معمولاً در <strong>زیر برگ، داخل گل و روی برگ‌های جوان</strong> دیده می‌شود. با تکان دادن برگ، حشرات به سرعت حرکت می‌کنند.</div>
                </div>
                <div class="section">
                    <div class="section-title">💊 روش‌های کنترل و درمان</div>
                    <div class="section-content">${data.control}</div>
                </div>
                <hr>
                <div class="section-content highlight">🎯 لکه‌های نقره‌ای و سفید روی برگ + بدشکلی = تریپس</div>
            `;
        }
        
        const btn = document.getElementById('stageBtn');
        btn.addEventListener('click', () => {
            let next = currentStage + 1;
            if (next > 3) next = 0;
            goToStage(next);
        });
        
        goToStage(0);
    })();
</script>
